<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0F0F1A;min-height:100vh}
.h{font-family:'Baloo 2',sans-serif}
.flip-wrap{perspective:1400px;width:100%;cursor:pointer;user-select:none}
.flip-inner{transition:transform .55s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;position:relative;min-height:260px;width:100%}
.flip-inner.on{transform:rotateY(180deg)}
.flip-f,.flip-b{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;text-align:center}
.flip-b{transform:rotateY(180deg)}
@keyframes si{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.si{animation:si .35s ease both}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.pop{animation:pop .25s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.shake{animation:shake .3s ease}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#7C3AED55;border-radius:4px}
.tab-btn{transition:all .2s ease;cursor:pointer}
.card-hover{transition:transform .2s ease,box-shadow .2s ease}
.card-hover:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.opt-btn{transition:all .2s ease;cursor:pointer}
.opt-btn:hover:not(:disabled){transform:translateX(4px)}
.hm-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(250,204,21,.1);border:1px solid rgba(250,204,21,.25);border-radius:8px;padding:6px 10px;margin-top:8px}
button{font-family:'DM Sans',sans-serif}
select{font-family:'DM Sans',sans-serif}
input{font-family:'DM Sans',sans-serif}
.content-area{max-width:720px;margin:0 auto;padding:16px}
.section-tabs{background:#12122A;border-bottom:1px solid #1E1E3A;overflow-x:auto}
.section-tabs-inner{max-width:720px;margin:0 auto;display:flex;padding:0 12px;min-width:max-content}
.mode-tabs{background:#12122A;border-bottom:1px solid #1E1E3A;padding:10px 16px;overflow-x:auto}
.mode-tabs-inner{max-width:720px;margin:0 auto;display:flex;gap:8px;min-width:max-content}
.day-dots{display:flex;gap:6px;margin-top:18px;justify-content:center;flex-wrap:wrap}
.day-dot{width:10px;height:10px;border-radius:50%;cursor:pointer;transition:all .2s}
</style>

const WORDS=[{id:1,w:"Aberrant",m:"Departing from accepted standard; abnormal",hm:"Jo normal ya accepted standard se bilkul alag ho",e:"The scientist noted aberrant cell growth in the sample."},{id:2,w:"Abhor",m:"Regard with disgust and hatred",hm:"Kisi cheez se bahut zyada nafrat ya ghrina karna",e:"She abhors any form of cruelty towards animals."},{id:3,w:"Abjure",m:"Solemnly renounce a belief or claim",hm:"Kisi belief ya claim ko officially aur openly chhodna",e:"He abjured his earlier political views under pressure."},{id:4,w:"Abscond",m:"Leave hurriedly and secretly to escape consequences",hm:"Bina bataye chori-chhuppe bhaag jaana",e:"The cashier absconded with the company funds."},{id:5,w:"Accolade",m:"An award or honour granted as recognition of merit",hm:"Kisi achievement ke liye milne wali award ya praise",e:"The film received accolades at every major festival."},{id:6,w:"Acrimony",m:"Bitterness or ill feeling in speech or manner",hm:"Baat-cheet mein kadhwaahat ya khunsaas",e:"The divorce proceedings were marked by great acrimony."},{id:7,w:"Admonish",m:"Warn or reprimand someone firmly but not harshly",hm:"Kisi ko dheere se par sakhti se daantna ya samjhaana",e:"The teacher admonished students for being repeatedly late."},{id:8,w:"Aesthetic",m:"Concerned with beauty or the appreciation of beauty",hm:"Khoobsurati se related; sundar cheezein pasand karna",e:"The room had a pleasing aesthetic quality to it."},{id:9,w:"Affable",m:"Friendly, good-natured, and easy to talk to",hm:"Dosto ki tarah milnasaaar aur baat karne mein aasaan",e:"The affable host made every single guest feel welcome."},{id:10,w:"Alacrity",m:"Brisk and cheerful readiness to act",hm:"Kisi kaam ko khushi aur jaldi se karne ki tayyari",e:"She accepted the challenging task with great alacrity."},{id:11,w:"Alleviate",m:"Make suffering or a problem less severe",hm:"Dard ya taklif ko thoda kam karna",e:"The medicine helped alleviate her chronic back pain."},{id:12,w:"Ambiguous",m:"Open to more than one interpretation; unclear",hm:"Jiski ek se zyada meaning ho, clearly samajh na aaye",e:"The contract contained several ambiguous clauses."},{id:13,w:"Ameliorate",m:"Make something bad or unsatisfactory better",hm:"Kisi buri situation ko behtar banana",e:"Efforts to ameliorate poverty across the region continue."},{id:14,w:"Amiable",m:"Having a friendly and pleasant manner",hm:"Meethe swabhaav wala, dosto jaisa",e:"She was an amiable colleague who always helped everyone."},{id:15,w:"Anachronism",m:"A thing belonging to a period other than the one it exists in",hm:"Jo cheez apne samay mein na ho, galat waqt mein ho",e:"Using a sword in modern warfare is an anachronism."},{id:16,w:"Anarchy",m:"A state of disorder due to absence of authority",hm:"Aisi sthiti jahan koi rule ya authority na ho",e:"The country descended into anarchy after the coup."},{id:17,w:"Anecdote",m:"A short amusing story about a real incident or person",hm:"Kisi real ghatna ke baare mein chota sa mazedar kissa",e:"He shared a funny anecdote about his first day at work."},{id:18,w:"Antipathy",m:"A deep-seated feeling of aversion or dislike",hm:"Kisi ke liye gehri nafrat ya aversion",e:"There was obvious antipathy between the two rivals."},{id:19,w:"Apathy",m:"Lack of interest, enthusiasm, or concern",hm:"Kisi cheez mein bilkul interest ya josh na hona",e:"Voter apathy led to an extremely low election turnout."},{id:20,w:"Appease",m:"Pacify someone by conceding to their demands",hm:"Gusse ko shant karne ke liye unki maang maanna",e:"The government tried to appease the angry protesters."},{id:21,w:"Arduous",m:"Involving great effort; difficult and tiring",hm:"Bahut mushkil aur thaka dene wala kaam",e:"The mountain trek was arduous but ultimately rewarding."},{id:22,w:"Articulate",m:"Express an idea clearly and effectively",hm:"Apni baat ko clearly aur achhi tarah se kehna",e:"She could articulate complex thoughts with great precision."},{id:23,w:"Ascertain",m:"Find something out for certain; verify",hm:"Pakka pata karna, confirm karna",e:"We need to ascertain the facts before making a decision."},{id:24,w:"Assuage",m:"Make an unpleasant feeling less intense",hm:"Dard ya dukh ko thoda halka karna",e:"He tried to assuage her grief with kind words."},{id:25,w:"Astute",m:"Having keen insight; shrewd and clever",hm:"Bahut chalak aur samajhdaar",e:"An astute businessman, he foresaw the market crash."},{id:26,w:"Atrocious",m:"Horrifyingly wicked or shockingly bad",hm:"Bahut bura ya dardnak; horror jaisa",e:"The living conditions in the camp were atrocious."},{id:27,w:"Audacious",m:"Showing willingness to take bold or daring risks",hm:"Bahut bold aur daring, risk lene wala",e:"The audacious plan to scale the cliff paid off well."},{id:28,w:"Austere",m:"Severe in manner; having no comforts or luxuries",hm:"Sadgi se rehna, koi aaish na karna",e:"The monk chose to lead a completely austere life."},{id:29,w:"Avarice",m:"Extreme greed for wealth or material gain",hm:"Paison ke liye bahut zyada lalach",e:"His avarice ultimately destroyed all his close relationships."},{id:30,w:"Banal",m:"Lacking originality; obviously boring and overused",hm:"Ek dam boring aur ghisa-pita; kuch naya nahi",e:"The speech was filled with banal, tired phrases."},{id:31,w:"Belligerent",m:"Hostile and aggressive; inclined to pick quarrels",hm:"Ladakoo swabhaav wala, jhagda karne wala",e:"The belligerent neighbor was constantly causing trouble."},{id:32,w:"Benevolent",m:"Well-meaning and kindly in nature toward others",hm:"Dil se acha aur doosron ki madad karne wala",e:"A benevolent ruler always cares deeply for his subjects."},{id:33,w:"Bias",m:"Prejudice in favour of or against a person or thing",hm:"Kisi ke baare mein bina soch pehle se hi raay banana",e:"The investigative report was criticized for blatant bias."},{id:34,w:"Blatant",m:"Done openly and unashamedly; completely obvious",hm:"Jo bilkul khullam khulla ho, chupaana na paaye",e:"It was a blatant attempt to mislead the public."},{id:35,w:"Brevity",m:"Concise and exact use of words; shortness of duration",hm:"Kam shabdon mein baat karna; chhotaapan",e:"Brevity is the soul of wit, as Shakespeare famously wrote."},{id:36,w:"Camaraderie",m:"Mutual trust and friendship among a group of people",hm:"Dosto ke beech ka pyaar aur ek-doosre par bharosa",e:"The team's camaraderie helped them win the championship."},{id:37,w:"Candid",m:"Truthful and straightforward; not concealing thoughts",hm:"Seedha aur sachcha; koi chupaav nahi",e:"She gave a brutally candid assessment of the project."},{id:38,w:"Capitulate",m:"Cease to resist an opponent; surrender to demands",hm:"Dabav mein aakar haar maan lena",e:"They refused to capitulate despite the mounting pressure."},{id:39,w:"Capricious",m:"Given to sudden unpredictable changes of mood",hm:"Jo baar-baar achhaanak mood change kare",e:"The capricious weather ruined their carefully planned event."},{id:40,w:"Caustic",m:"Sarcastic in a cutting, bitter, or burning way",hm:"Aisi baat jo zeher jaisi lage, katili",e:"His caustic remarks hurt everyone present in the room."},{id:41,w:"Circumspect",m:"Wary and unwilling to take risks; very cautious",hm:"Sochsamajhkar, savdhaani se kaam karna",e:"She was circumspect about making any new investments."},{id:42,w:"Clandestine",m:"Kept secret; done secretively, especially when illicit",hm:"Chupchaap aur anjaane mein kiya gaya kaam",e:"They held a series of clandestine meetings in the basement."},{id:43,w:"Coerce",m:"Persuade someone to do something by force or threats",hm:"Dara-dhamakaakar kuch karvaana",e:"He was coerced into signing the fraudulent document."},{id:44,w:"Cogent",m:"Clear, logical, and convincing in reasoning or argument",hm:"Saaf aur mantikpur tarike se apni baat kehna",e:"She presented a cogent argument for the new policy."},{id:45,w:"Complacent",m:"Showing smug or uncritical satisfaction with oneself",hm:"Apni safaltaon se bahut khush rehna aur aage na sochna",e:"Never become complacent after achieving just one success."},{id:46,w:"Concede",m:"Admit or acknowledge something reluctantly as true",hm:"Maan lena ki kuch sach hai, chahe dil na maane",e:"He finally conceded that his approach had been wrong."},{id:47,w:"Condescend",m:"Show a feeling of superiority; act patronizingly",hm:"Apne aap ko doosron se bada samjhkar behave karna",e:"Don't condescend to your juniors — always respect them."},{id:48,w:"Convoluted",m:"Extremely complex and difficult to understand or follow",hm:"Bahut hi pechida aur ulajha hua",e:"The novel's plot was unnecessarily convoluted and confusing."},{id:49,w:"Corroborate",m:"Confirm or give support to a statement or theory",hm:"Kisi baat ko proof deke confirm karna",e:"Multiple independent witnesses corroborated his alibi."},{id:50,w:"Credulous",m:"Too willing to believe things without proof; gullible",hm:"Jo bhi suna usee sach maan le, bhola-bhala",e:"Credulous people are easily deceived by online scams."},{id:51,w:"Cynical",m:"Distrustful of human sincerity or integrity",hm:"Logon ki neeyat par yakin na karna",e:"He was deeply cynical about the government's promises."},{id:52,w:"Debilitate",m:"Make someone very weak and physically infirm",hm:"Kisi ko bahut kamzor kar dena",e:"The long illness had completely debilitated the old man."},{id:53,w:"Decorum",m:"Behavior in keeping with good taste and social propriety",hm:"Society ke taur-tareekon ke hisaab se accha behave karna",e:"She maintained perfect decorum throughout the formal event."},{id:54,w:"Deft",m:"Neatly skillful and quick in movement or action",hm:"Bahut hi kushalta aur phurti se kaam karna",e:"The juggler made a remarkably deft catch of all five balls."},{id:55,w:"Deference",m:"Humble submission and respectful yielding to another",hm:"Bade ya izzatdaar logon ke aage jhukna aur izzat dena",e:"He always treated his elders with great deference."},{id:56,w:"Deleterious",m:"Causing harm or damage to something; injurious",hm:"Sehat ya kisi cheez ke liye haanikaarak",e:"Smoking has profoundly deleterious effects on one's health."},{id:57,w:"Demagogue",m:"A political leader who appeals to emotions and prejudices",hm:"Neta jo logon ki bhavnaon se khelkar apna kaam nikale",e:"The demagogue spread fear and division among the citizens."},{id:58,w:"Denounce",m:"Publicly declare something to be wrong or evil",hm:"Sabke saamne kisi ko galat ya bura kehna",e:"The activist denounced the government's corrupt practices."},{id:59,w:"Depict",m:"Show or represent something in a picture or story",hm:"Kisi baat ya jagah ko picture ya kahani se dikhana",e:"The painting vividly depicts rural life in old India."},{id:60,w:"Deride",m:"Express contempt for; ridicule or mock something",hm:"Kisi ka mazaak udaana ya thaana",e:"Critics mercilessly derided his first theatrical performance."},{id:61,w:"Dilapidated",m:"In a state of disrepair through age or neglect",hm:"Purani aur toot-futee; mrammat ki zaroorat wali",e:"They found temporary shelter in a dilapidated old barn."},{id:62,w:"Dilettante",m:"A person who dabbles in a subject without serious study",hm:"Jo thoda-bahut seekhe par serious na ho",e:"He was a dilettante artist with very little real technique."},{id:63,w:"Discern",m:"Recognize or find something out; distinguish clearly",hm:"Clearly samajhna ya pehchaanna",e:"It is often hard to discern truth from clever fiction."},{id:64,w:"Disdain",m:"Consider something unworthy; show utter contempt",hm:"Kisi ko chhota samajhna, nafrat se dekhna",e:"She looked at his crude behavior with obvious disdain."},{id:65,w:"Disparity",m:"A great difference between things; marked inequality",hm:"Do cheezoon mein bahut bada farq hona",e:"There is a vast disparity in income between the two classes."},{id:66,w:"Docile",m:"Ready to accept control; submissive and obedient",hm:"Jo bhi kaha jaaye maan le, seedha-saada",e:"The docile child obeyed every instruction without question."},{id:67,w:"Duplicity",m:"Deceitfulness; deliberate deceptive or double-dealing",hm:"Dhokha dena; ek muh se do baatein karna",e:"His long-hidden duplicity was finally exposed to all."},{id:68,w:"Ebullient",m:"Cheerful and full of energy, enthusiasm, and vitality",hm:"Bahut khush aur josh se bhara hua",e:"Her ebullient personality brightened every room she entered."},{id:69,w:"Eccentric",m:"Unconventional and slightly strange in behaviour",hm:"Thoda alag aur ajeebo-ghareeb swabhaav wala",e:"The eccentric professor had many peculiar daily habits."},{id:70,w:"Eloquent",m:"Fluent or persuasive in speaking or writing",hm:"Bahut achhi aur asar karti baat karne wala",e:"She delivered an eloquent speech that moved the audience."},{id:71,w:"Eminent",m:"Respected, distinguished, and prominent in one's field",hm:"Bahut mashoor aur izzatdar apne kaam mein",e:"An eminent Indian scientist won the Nobel Prize this year."},{id:72,w:"Empathy",m:"The ability to understand and share the feelings of another",hm:"Doosre ka dard apna samajhna aur mehsoos karna",e:"Good leaders must demonstrate genuine empathy toward teams."},{id:73,w:"Enumerate",m:"Mention a number of things one by one in detail",hm:"Ek-ek karke saari cheezein ginnana",e:"He carefully enumerated every benefit of the proposed plan."},{id:74,w:"Ephemeral",m:"Lasting for a very short time only; transitory",hm:"Jo bahut thodi der ke liye ho, jaldi khatam ho jaaye",e:"Social media fame is often fleeting and entirely ephemeral."},{id:75,w:"Equivocal",m:"Open to two or more interpretations; deliberately vague",hm:"Jis baat ke do matlab nikle, jaanbujhkar unclear",e:"The politician gave an equivocal and evasive non-answer."},{id:76,w:"Erudite",m:"Having or showing great knowledge or deep learning",hm:"Bahut zyada padha-likha aur gyaanvaan",e:"The erudite professor wrote more than thirty scholarly books."},{id:77,w:"Exacerbate",m:"Make a problem, bad situation, or negative feeling worse",hm:"Kisi buri situation ko aur bhi bura banana",e:"His rude comments only served to exacerbate the tension."},{id:78,w:"Exemplary",m:"Serving as a desirable model; commendably good",hm:"Itna accha ki doosron ke liye misaal bane",e:"Her professional conduct throughout the entire crisis was exemplary."},{id:79,w:"Exhaustive",m:"Including or considering all elements or aspects; thorough",hm:"Har ek pehlu ko cover karne wala, poora",e:"An exhaustive police search of the premises found no evidence."},{id:80,w:"Exonerate",m:"Officially absolve someone from blame or a criminal charge",hm:"Kisi ko sari zimmedaari aur ilzaam se azaad karna",e:"New DNA evidence finally exonerated him of all the charges."},{id:81,w:"Explicit",m:"Stated clearly and in detail; leaving no ambiguity",hm:"Bilkul saaf aur clear, koi confusion nahi",e:"The safety instructions were explicit and easy to follow."},{id:82,w:"Extol",m:"Praise someone or something enthusiastically and highly",hm:"Kisi ki bahut zyada tarif karna",e:"Teachers should always extol the great virtues of hard work."},{id:83,w:"Exuberant",m:"Filled with lively energy and excitement; effusive",hm:"Josh aur energy se bhara-pura",e:"The crowd became exuberant after India's stunning victory."},{id:84,w:"Facetious",m:"Treating serious issues with inappropriate or flippant humor",hm:"Serious baat par bhi mazaak karna",e:"His facetious remarks during the memorial upset everyone."},{id:85,w:"Fallacy",m:"A mistaken belief or idea based on unsound reasoning",hm:"Galat soch ya galat belief jo sach lagti ho",e:"It is a common fallacy that money alone brings true happiness."},{id:86,w:"Fastidious",m:"Very attentive to accuracy and detail; very exacting",hm:"Har choti cheez par bahut dhyan dene wala",e:"She was especially fastidious about personal cleanliness."},{id:87,w:"Flagrant",m:"Conspicuously or obviously offensive; shamelessly blatant",hm:"Jo bilkul sharam ke baghair galat kaam kare",e:"It was a flagrant violation of the school's code of conduct."},{id:88,w:"Flippant",m:"Not showing a serious or respectful attitude; disrespectful",hm:"Serious cheez ko bhi halke mein lena",e:"His flippant response deeply angered the senior interviewer."},{id:89,w:"Fortitude",m:"Courage and resilience in bearing pain or adversity",hm:"Mushkil mein bhi hosla rakhna",e:"She faced her prolonged illness with extraordinary fortitude."},{id:90,w:"Frugal",m:"Sparing or economical with money and resources",hm:"Paisa aur cheezein save karke rehne wala",e:"Despite his great wealth, he always lived a frugal lifestyle."},{id:91,w:"Futile",m:"Incapable of producing any useful result; completely pointless",hm:"Bilkul bekar koshish, koi fayda nahi",e:"It proved utterly futile to argue with someone so stubborn."},{id:92,w:"Garrulous",m:"Excessively talkative, especially on trivial matters",hm:"Jo bahut zyada aur bewajooh baata kare",e:"The garrulous neighbor would talk endlessly from dawn to dusk."},{id:93,w:"Grandiose",m:"Impressive in scale; absurdly exaggerated in ambition",hm:"Bahut bada-bada dikhawaa, haqeeqat se pareya",e:"He presented grandiose plans that were clearly unachievable."},{id:94,w:"Gregarious",m:"Fond of company; sociable and outgoing by nature",hm:"Logo ke saath rehna pasand karne wala",e:"Being naturally gregarious, she made new friends very quickly."},{id:95,w:"Guile",m:"Sly or cunning intelligence used to deceive others",hm:"Chalaaki aur dhokhe se kaam nikalna",e:"He succeeded entirely through guile rather than honest effort."},{id:96,w:"Gullible",m:"Easily persuaded to believe something without questioning it",hm:"Jo kisi bhi baat par jaldi yaqeen kar le",e:"Gullible tourists often become easy targets for street scammers."},{id:97,w:"Hamper",m:"Hinder or impede the movement, progress, or freedom of",hm:"Kisi kaam ko aage badhne se rokna",e:"Heavy flooding hampered the crucial ongoing rescue operation."},{id:98,w:"Haughty",m:"Arrogantly superior and disdainful of others",hm:"Apne aap ko bahut bada samajhna, ahankaari",e:"His haughty attitude and manner made him deeply unpopular."},{id:99,w:"Hypocrite",m:"A person who claims virtues or beliefs they don't practise",hm:"Jo khud kuch aur kare, doosron ko kuch aur sikhaye",e:"Don't be a hypocrite — always practise what you preach."},{id:100,w:"Impeccable",m:"In accordance with the highest standards; completely flawless",hm:"Bilkul perfect, koi kami nahi",e:"Her work ethic and overall dress sense were truly impeccable."},{id:101,w:"Insolent",m:"Showing rude and arrogant lack of respect",hm:"Bade logon ka bhi aadar na karna, dheetapan dikhaana",e:"The insolent student talked back to the principal."},{id:102,w:"Lament",m:"Feel or express grief or sorrow about something",hm:"Dukh ya pareshani mein rona ya haai karna",e:"She lamented the loss of her childhood friend bitterly."},{id:103,w:"Languid",m:"Lacking energy or vitality; faint or weak",hm:"Thaka hua, energy bilkul nahi; dheelapan",e:"The summer heat made everyone feel languid and tired."},{id:104,w:"Lucid",m:"Expressed clearly and easy to understand",hm:"Jo bilkul clear aur samajhne mein aasaan ho",e:"Even in fever she gave a lucid account of the events."},{id:105,w:"Magnanimous",m:"Generous and forgiving, especially toward a rival",hm:"Dil ka bahut bada, maafi dene wala",e:"The champion was magnanimous in victory towards all rivals."},{id:106,w:"Meticulous",m:"Showing great attention to detail; very careful",hm:"Har choti se choti cheez ka bahut dhyan rakhna",e:"A meticulous editor, she missed not a single error."},{id:107,w:"Nonchalant",m:"Feeling or appearing casual and relaxed; unconcerned",hm:"Jo kuch bhi ho, koi farq nahi padta — attitude wala",e:"He was nonchalant about the upcoming high-stakes exam."},{id:108,w:"Obstinate",m:"Stubbornly refusing to change one's opinion or behaviour",hm:"Jo apni baat se na hile, ziddi",e:"The obstinate child refused to eat any green vegetables."},{id:109,w:"Opulent",m:"Ostentatiously rich and luxurious",hm:"Bahut ameer aur aaish wala; shahi",e:"They lived in an opulent mansion with a grand fountain."},{id:110,w:"Verbose",m:"Using more words than needed; wordy",hm:"Bahut zyada aur bewajooh baat karna, zyada shabd use karna",e:"His verbose report could easily have been half the length."}];

const IDIOMS=[{id:1,ph:"A blessing in disguise",m:"Something that seems bad but turns out to be good",hm:"Jo bura lagta hai par baad mein achha nikle",e:"Losing that job was a blessing in disguise — I found a better one."},{id:2,ph:"Beat around the bush",m:"Avoid coming to the main point of a matter",hm:"Asli baat kehne se bachna, ghumaa-phiraakar bolna",e:"Stop beating around the bush and tell me the truth."},{id:3,ph:"Bite the bullet",m:"Endure a painful or difficult situation bravely",hm:"Mushkil situation ko himmat se jhhelna",e:"We just have to bite the bullet and accept the loss."},{id:4,ph:"Break the ice",m:"Do or say something to relieve tension in a situation",hm:"Tension door karne ke liye kuch bolna ya karna",e:"He told a joke to break the ice at the meeting."},{id:5,ph:"Burn the midnight oil",m:"Work or study late into the night",hm:"Raat geye tak padhai ya kaam karna",e:"She burned the midnight oil to finish her assignment."},{id:6,ph:"Bite off more than you can chew",m:"Take on more responsibility than you can manage",hm:"Aukat se zyada kaam le lena",e:"He bit off more than he could chew with three projects at once."},{id:7,ph:"Cost an arm and a leg",m:"Be very expensive",hm:"Bahut mehanga hona",e:"That latest smartphone costs an arm and a leg."},{id:8,ph:"Cut corners",m:"Do something poorly to save time or money",hm:"Kaam theek se na karna, shortcut maarna",e:"The builder cut corners on the safety measures."},{id:9,ph:"Face the music",m:"Accept the unpleasant consequences of your actions",hm:"Apne kaamon ka bura nateeja bhugutna",e:"You have to face the music for your mistakes sooner or later."},{id:10,ph:"Hit the nail on the head",m:"Be exactly right about something",hm:"Bilkul sahi baat kehna",e:"You hit the nail on the head with that analysis."},{id:11,ph:"Kill two birds with one stone",m:"Accomplish two things with a single action",hm:"Ek kaam se do kaam nikaal lena",e:"By jogging to work, she killed two birds with one stone."},{id:12,ph:"Let the heir very first year."},{id:24,ph:"By the skin of one's teeth",m:"Just barely succeed or escape",hm:"Bahut mushkil se bacchna ya kamyaab hona",e:"He passed the tough exam by the skin of his teeth."},{id:25,ph:"Cross that bridge when you come to it",m:"Deal with a problem only when it actually arises",hm:"Mushkil aane par hi sochna, abhi se kyun socho",e:"Don't worry about that now — cross that bridge when you come to it."},{id:26,ph:"Don't judge a book by its cover",m:"Don't judge by appearances or first impressions alone",hm:"Kisi ki dikhaavat se usse judge mat karo",e:"He seemed cold but was generous — don't judge a book by its cover."},{id:27,ph:"Every cloud has a silver lining",m:"Every bad situation has a positive aspect to it",hm:"Har buri baat mein kuch accha bhi hota hai",e:"Losing power taught us its value — every cloud has a silver lining."},{id:28,ph:"Get out of hand",m:"Lose control of a situation; become unmanageable",hm:"Haalaat haath se nikhal jaana, kaabo se bahar",e:"The street celebration quickly got completely out of hand."},{id:29,ph:"Go back to the drawing board",m:"Start over completely from scratch with a new plan",hm:"Phir se shuru se sochna aur naya plan banana",e:"The project failed badly, so we went back to the drawing board."},{id:30,ph:"Hit the sack",m:"Go to bed to sleep",hm:"So jaana, bistar pakadna",e:"I'm absolutely exhausted — time to hit the sack!"},{id:31,ph:"In the heat of the moment",m:"While overwhelmed by strong emotion or excitement",hm:"Josh ya gusse mein aakar kuch bol ya kar dena",e:"He said things he didn't mean in the heat of the moment."},{id:32,ph:"Jump on the bandwagon",m:"Follow a popular trend or activity",hm:"Jo sab kar rahe hain, wahi karna",e:"Everyone seems to be jumping on the fitness bandwagon now."},{id:33,ph:"Keep your chin up",m:"Stay positive and cheerful in difficult times",hm:"Mushkil mein bhi himmat rakhna",e:"Keep your chin up — things will definitely get better soon."},{id:34,ph:"Leave no stone unturned",m:"Try every possible option to achieve a goal",hm:"Poori koshish karna, koi raasta na chhodna",e:"The detective left no stone unturned in his investigation."},{id:35,ph:"Make a long story short",m:"Come to the point quickly without many details",hm:"Seedha mool baat pe aana, zyada details mat do",e:"To make a long story short, we ultimately lost the deal."},{id:36,ph:"No pain, no gain",m:"Effort and hardship are needed to achieve good results",hm:"Mehnat ke bina kuch nahi milta",e:"Keep practising every day — no pain, no gain!"},{id:37,ph:"On the ball",m:"Alert, efficient, and competent",hm:"Hoshiyaar aur efficient rehna",e:"She was always completely on the ball during important meetings."},{id:38,ph:"Pass the buck",m:"Shift responsibility to someone else; avoid blame",hm:"Apni zimmedaari doosre par daal dena",e:"He always passes the buck whenever something goes wrong."},{id:39,ph:"Play devil's advocate",m:"Argue the opposing side to test the strength of an idea",hm:"Sirf test karne ke liye ulti side se argument karna",e:"Let me play devil's advocate — what if we are completely wrong?"},{id:40,ph:"Put the cart before the horse",m:"Do things in the wrong or illogical order",hm:"Seedhe kaam ko ulte order mein karna",e:"Celebrating before winning is putting the cart before the horse."},{id:41,ph:"Raining cats and dogs",m:"Raining extremely heavily",hm:"Bahut tez baarish hona",e:"We couldn't go out; it was raining cats and dogs outside."},{id:42,ph:"Read between the lines",m:"Find the hidden or implied meaning in something",hm:"Jo seedha nahi kaha, uski chupi matlab samajhna",e:"Read between the lines of his carefully worded speech."},{id:43,ph:"Rock the boat",m:"Disturb a stable or peaceful situation",hm:"Shant situation mein hulchul macha dena",e:"Don't rock the boat when things are finally going so well."},{id:44,ph:"See eye to eye",m:"Agree completely with someone on something",hm:"Kisi se poori tarah se sahmati hona",e:"We don't always see eye to eye on every an't have your cake and eat it."},{id:55,ph:"Bite someone's head off",m:"Respond to someone very angrily and harshly",hm:"Kisi par bahut gusse se bhadakna",e:"Why did you bite my head off just for asking a simple question?"},{id:56,ph:"Burn bridges",m:"Permanently ruin a relationship or opportunity",hm:"Rishte ya connection hamesha ke liye kharaab karna",e:"Never burn bridges with former employers — it may backfire."},{id:57,ph:"Caught red-handed",m:"Discovered in the very act of doing something wrong",hm:"Galat kaam karte pakda jaana",e:"The shoplifter was caught red-handed by the security guard."},{id:58,ph:"Dead ringer",m:"A person or thing that looks exactly like another",hm:"Bilkul ek jaisa dikhne wala",e:"She is a complete dead ringer for her famous mother."},{id:59,ph:"Eat humble pie",m:"Make a humble apology and accept humiliation",hm:"Sharminda hokar maafi maangna",e:"He had to publicly eat humble pie after being proven wrong."},{id:60,ph:"Fall on deaf ears",m:"Be completely ignored or go unheeded",hm:"Kisi ne suna hi nahi, advice bekar gayi",e:"All of her repeated warnings simply fell on deaf ears."},{id:61,ph:"Give the cold shoulder",m:"Deliberately ignore or show indifference to someone",hm:"Jaanbujhkar kisi ko ignore karna",e:"She gave him the cold shoulder after their argument."},{id:62,ph:"Have a heart of gold",m:"Be extremely kind, generous, and good-natured",hm:"Bahut acha aur dariyadil insaan hona",e:"Despite his gruff manner, the old man has a heart of gold."},{id:63,ph:"In the same boat",m:"In the same difficult or challenging situation",hm:"Hum dono ek hi mushkil mein hain",e:"We're all in the same boat during this financial crisis."},{id:64,ph:"Jump to conclusions",m:"Make quick judgments without knowing all the facts",hm:"Bina poori baat jaane fatwa sunaa dena",e:"Don't jump to conclusions before hearing the full story."},{id:65,ph:"Keep a stiff upper lip",m:"Be stoic and show no emotion in difficult situations",hm:"Mushkil mein bhi bina rote chalte rehna",e:"He kept a stiff upper lip through all the hardships."},{id:66,ph:"Lend someone a hand",m:"Offer help or assistance to someone who needs it",hm:"Kisi ki madad karna",e:"Could you possibly lend me a hand with moving this heavy box?"},{id:67,ph:"Lose one's marbles",m:"Go crazy; lose one's sanity or good judgment",hm:"Paagal ho jaana, dimaag kharaab ho jaana",e:"He's been acting so strangely — he seems to have lost his marbles."},{id:68,ph:"Make ends meet",m:"Earn just barely enough money to cover basic living expenses",hm:"Kharche ke liye mushkil se paisa poora karna",e:"With two part-time jobs, they can barely make ends meet."},{id:69,ph:"Nip in the bud",m:"Stop something harmful at a very early stage",hm:"Burai ko shuruat mein hi rok dena",e:"You should nip that bad habit in the bud before it grows."},{id:70,ph:"Off the beaten track",m:"In an unusual, remote, or unfamiliar location",hm:"Anjaan aur door ki jagah par",e:"The charming little village was completely off the beaten track."},{id:71,ph:"On the fence",m:"Undecided or uncommitted about something",hm:"Kuch bhi decide na kar paana, beech mein atakna",e:"I'm still on the fence about accepting the new job offer."},{id:72,ph:"Paint the town red",m:"Go out and celebrate in a wild and lively manner",hm:"Bahut masti aur dhamaal ke saath celebrate karna",e:"After graduation, the entire class painted the town red."},{id:73,ph:"Pie in the sky",m:"An unrealistic, impractical, or impossible dream or plan",hm:"Hawaai qile banana, jo kabhi poora na ho",e:"His plan to become a billionaire overnight is pure pie in the sky."},{id:74,ph:"Pull strings",m:"Use one's influence or contacts to get something done",hm:"Jaanpehchaan ya sifarish se kaam karvaana",e:"He had to pull strings with the committee to get approval."},{id:75,ph:"Put your foot in your mouth",m:"Say something embarrassing, wrong, or tactless",hm:"Kuch aisa bol dena jisse sharmindagi ho",e:"He really put his foot in his mouth at the company dinner."},{id:76,ph:"Raise the bar",m:"Set a higher standard or level of achievement",hm:"Pehle se zyada ooncha standard set karna",e:"The new product launch raised the bar for all competitors."},{id:77,ph:"Run out of steam",m:"Lose energy, motivation, or enthusiasm for something",hm:"Dheere-dheere kaam ka josh khatam ho jaana",e:"The initially exciting social campaign eventually ran out of steam."},{id:78,ph:"Safe and sound",m:"Completely unharmed and out of any danger",hm:"Bilkul surakshit aur bina kisi chot ke",e:"The missing hikers finally returned home safe and sound."},{id:79,ph:"Show your true colors",m:"Reveal your real character or intentions",hm:"Apna asli chehra dikhaana",e:"He showed his true colors when the situation got difficult."},{id:80,ph:"Sink or swim",m:"Fail or succeed entirely on one's own merits",hm:"Ya toh kamyaab ho ya fail — khud ke dum par",e:"In the competitive startup world, it's truly sink or swim."},{id:81,ph:"Sour grapes",m:"Pretending to dislike what one cannot have",hm:"Jo nahi mila usse jhoothe hi bura kehna",e:"Saying the prize was unfair is just sour grapes on his part."},{id:82,ph:"Split hairs",m:"Make very fine and unnecessary distinctions",hm:"Choti-choti bewajooh baaton par argument karna",e:"Stop splitting hairs and focus on the main central issue."},{id:83,ph:"Strike while the iron is hot",m:"Act at the most favourable opportunity available",hm:"Sahi mauke ka fayda uthao",e:"Apply for the scholarship now — strike while the iron is hot."},{id:84,ph:"Take the bull by the horns",m:"Deal with a difficult situation directly and bravely",hm:"Mushkil ka seedha saamna karna",e:"She took the bull by the horns and confronted her manager."},{id:85,ph:"The pot calling the kettle black",m:"Accusing someone of a fault that you yourself have",hm:"Khud wahi karna aur doosron ko ussi ke liye doshi kehna",e:"You calling him lazy? That's the pot calling the kettle black."},{id:86,ph:"Under someone's thumb",m:"Completely under another person's control or influence",hm:"Kisi ke puri tarah kaaboo mein hona",e:"He is entirely under his controlling boss's thumb at work."},{id:87,ph:"Up the ante",m:"Increase the stakes, demands, or intensity of a situation",hm:"Stakes ya darje ko aur badhaa dena",e:"The union decided to up the ante by calling for a full strike."},{id:88,ph:"Walk on eggshells",m:"Be extremely careful not to upset or offend someone",hm:"Bahut savdhaani se kisi ke saath behave karna",e:"Everyone walks on eggshells around her when she's in a mood."},{id:89,ph:"Wet behind the ears",m:"Inexperienced, naive, and new to something",hm:"Bilkul naya aur anjar-panjara, anubhav nahi",e:"The new recruit is still completely wet behind the ears."},{id:90,ph:"Wild goose chase",m:"A completely fruitless search or pointless pursuit",hm:"Bekar aur vyarth ki dhaundh",e:"Looking for him in the city was a complete wild goose chase."},{id:91,ph:"With flying colors",m:"Very successfully; with distinction",hm:"Bahut achhi tarah se, topper ki tarah",e:"She passed the difficult CUET exam with flying colors."},{id:92,ph:"Word for word",m:"In exactly the same words; verbatim",hm:"Bilkul waisi hi baat, ek shabd bhi change nahi",e:"He could repeat the long speech almost word for word."},{id:93,ph:"Wrap your head around",m:"Manage to understand something complex or surprising",hm:"Kisi pechide topic ko samajhne ki koshish karna",e:"It's hard to wrap your head around quantum physics concepts."},{id:94,ph:"At the drop of a hat",m:"Without any hesitation; immediately and willingly",hm:"Bina soche, ek dum se, turant",e:"She would help anyone at the drop of a hat."},{id:95,ph:"Back to square one",m:"Having to start over completely from the very beginning",hm:"Phir se shuruat se karna padega",e:"The plan failed miserably and we're back to square one again."},{id:96,ph:"Barking up the wrong tree",m:"Looking in the wrong place or pursuing the wrong person",hm:"Galat jagah ya galat insaan ko dhundhna",e:"If you think I took the money, you're barking up the wrong tree."},{id:97,ph:"Bend over backwards",m:"Make a very great effort to help or please someone",hm:"Kisi ke liye poori koshish karna",e:"She bent over backwards to satisfy every difficult client."},{id:98,ph:"Blood is thicker than water",m:"Family loyalty is stronger than other relationships",hm:"Khoon ke rishte baaki sabse zyada mazbhoot hote hain",e:"He supported his brother anyway — blood is thicker than water."},{id:99,ph:"Break a leg",m:"Good luck (originally a theatrical expression for actors)",hm:"All the best! (actors ke liye ek purana phrase)",e:"Break a leg at your big CUET exam today!"},{id:100,ph:"Cry over spilled milk",m:"Worry uselessly about things that cannot be changed",hm:"Jo ho gaya uske liye rona bekar hai",e:"The deal fell through; no use crying over spilled milk now."},{id:101,ph:"Add fuel to the fire",m:"Worsen an already bad situation",hm:"Pehle se buri situation ko aur bura karna",e:"His comment only added fuel to the fire during the argument."},{id:102,ph:"All bark and no bite",m:"Threatening but not willing to act",hm:"Sirf dhamki deta hai, karta kuch nahi",e:"Don't worry about him — he's all bark and no bite."},{id:103,ph:"Blow one's own trumpet",m:"Boast about one's own achievements",hm:"Apni hi tarif karna, badaai maarna",e:"He is always blowing his own trumpet at team meetings."},{id:104,ph:"Burn one's boats",m:"Do something that makes it impossible to go back",hm:"Aisa karna ki waapas jaane ka raasta band ho jaaye",e:"By resigning publicly, she burned her boats with the firm."},{id:105,ph:"Cut the Gordian knot",m:"Solve a complex problem by a bold and swift action",hm:"Pechide masle ko bold action se ek jhatke mein sulajaana",e:"The new CEO cut the Gordian knot by merging both divisions."},{id:106,ph:"Eat someone's salt",m:"Be a guest and enjoy someone's hospitality",hm:"Kisi ke yahan khaana khaana, ehsaan lena",e:"You've eaten his salt — now you must not betray him."},{id:107,ph:"Go the extra mile",m:"Make more effort than is expected",hm:"Zaroorat se zyada mehnat karna",e:"A great teacher always goes the extra mile for students."},{id:108,ph:"Have an axe to grind",m:"Have a private reason to be involved in something",hm:"Apna koi chhupa hua swarth hona",e:"He supports the policy because he has an axe to grind."},{id:109,ph:"Look before you leap",m:"Think carefully before taking a big step",hm:"Bina soche-samjhe koi bada qadam na uthao",e:"She reminded him to look before you leap before signing."},{id:110,ph:"The whole nine yards",m:"Everything possible; the full amount or extent",hm:"Poori cheez, sab kuch ek saath",e:"The wedding had decorations, food, music — the whole nine yards."}];

let state = {
  sec: "words",
  mode: "daily",
  dayIdx: 0,
  flipped: {},
  fcIdx: 0,
  bookmarks: {},
  search: "",
  quizIdx: 0,
  quizScore: 0,
  quizSelected: null,
  quizDone: false,
  quizOpts: [],
};

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function getDaily10(data, dayIdx) {
  return data.slice(dayIdx * 10, dayIdx * 10 + 10);
}

function getQuizOptions(allData, correct, field) {
  const others = allData.filter(d => d.id !== correct.id);
  return shuffle([correct, ...shuffle(others).slice(0, 3)]);
}

function initQuiz() {
  const cfg = SECTIONS[state.sec];
  const daily10 = getDaily10(cfg.data, state.dayIdx);
  state.quizIdx = 0;
  state.quizScore = 0;
  state.quizSelected = null;
  state.quizDone = false;
  state.quizOpts = getQuizOptions(cfg.data, daily10[0], cfg.qField);
}

function renderSectionTabs() {
  const tabs = Object.entries(SECTIONS).map(([k, c]) => {
    const active = state.sec === k;
    return `<button class="tab-btn" onclick="setSec('${k}')" style="padding:13px 14px;border:none;background:none;cursor:pointer;border-bottom:3px solid ${active?c.color:'transparent'};font-weight:${active?700:500};color:${active?c.color:'#64748B'};font-size:13px;display:flex;align-items:center;gap:5px;white-space:nowrap">${c.icon} ${c.label}</button>`;
  }).join('');
  return `<div class="section-tabs"><div class="section-tabs-inner">${tabs}</div></div>`;
}

function renderModeTabs() {
  const cfg = getCfg();
  const bmCount = cfg.data.filter(d => state.bookmarks[`${state.sec}-${d.id}`]).length;
  const modes = {
    daily: "📅 Daily 10",
    flashcard: "🃏 Flashcard",
    quiz: "🧠 Quiz",
    all: "📋 Sab 110",
    bookmarks: `⭐ Saved (${bmCount})`

  const tabs = Object.entries(modes).map(([m, lbl]) => {
    const active = state.mode === m;
    return `<button class="tab-btn" onclick="setMode('${m}')" style="padding:7px 14px;border-radius:20px;border:1.5px solid ${active?cfg.color:'#2D2D44'};background:${active?cfg.color:'transparent'};color:${active?'#fff':'#64748B'};font-size:12px;font-weight:${active?700:500};cursor:pointer;white-space:nowrap">${lbl}</button>`;

  return `<div class="mode-tabs"><div class="mode-tabs-inner">${tabs}</div></div>`;
}

      <div class="h" style="font-weight:800;font-size:17px;color:#F8FAFC">${cfg.icon} Day ${state.dayIdx+1} — Items ${state.dayIdx*10+1}–${state.dayIdx*10+10}</div>
      <div style="display:flex;gap:8px">
        <button onclick="prevDay()" ${state.dayIdx===0?'disabled':''} style="padding:7px 16px;border-radius:10px;border:1.5px solid #2D2D44;background:${state.dayIdx===0?'#16162A':'#1C1C2E'};cursor:${state.dayIdx===0?'default':'pointer'};font-size:13px;font-weight:600;color:${state.dayIdx===0?'#374151':'#E2E8F0'}">← Prev</button>
        <button onclick="nextDay()" ${state.dayIdx===10?'disabled':''} style="padding:7px 16px;border-radius:10px;border:none;background:${state.dayIdx===10?'#2D2D44':cfg.color};cursor:${state.dayIdx===10?'default':'pointer'};font-size:13px;font-weight:600;color:#fff">Next →</button>
      </div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap">${dayBtns}</div>
    <div style="display:flex;flex-direction:column;gap:12px">
      ${daily10.map(item => renderWordCard(item, state.sec)).join('')}
    </div>
  </div>`;
}

function renderFlashcard() {
  const cfg = getCfg();
  const daily10 = getDaily10(cfg.data, state.dayIdx);
  const item = daily10[state.fcIdx];
  const flipKey = `${state.sec}-${state.dayIdx}-${state.fcIdx}`;
  const isFlipped = !!state.flipped[flipKey];

  const dots = daily10.map((_,i) => {
    const fk = `${state.sec}-${state.dayIdx}-${i}`;
    const bg = i===state.fcIdx ? cfg.color : state.flipped[fk] ? cfg.color+'66' : '#2D2D44';
    return `<div class="day-dot" onclick="setFcIdx(${i})" style="background:${bg}"></div>`;
  }).join('');

  const dayOpts = Array.from({length:11},(_,i)=>`<option value="${i}" ${i===state.dayIdx?'selected':''}>Day ${i+1}</option>`).join('');

  return `
  <div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <div class="h" style="font-weight:800;font-size:17px;color:#F8FAFC">🃏 Flashcard Mode</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:#64748B;font-weight:600">Day:</span>
        <select onchange="setDayFlashcard(this.value)" style="border:1.5px solid ${cfg.color}44;border-radius:8px;padding:5px 10px;font-size:13px;outline:none;background:#1C1C2E;color:#F1F5F9;font-weight:600">${dayOpts}</select>
      </div>
    </div>
    <div style="text-align:center;margin-bottom:10px"><span style="font-size:13px;color:${cfg.color};font-weight:700">${state.fcIdx+1} / ${daily10.length}</span></div>
    <div class="flip-wrap" onclick="flipCard()">
      <div class="flip-inner${isFlipped?' on':''}">
        <div class="flip-f" style="background:linear-gradient(135deg,${cfg.color}ee,${cfg.color});color:#fff">
          <div style="font-size:11px;font-weight:700;opacity:.65;margin-bottom:10px;letter-spacing:1.5px;text-transform:uppercase">${cfg.label.replace(/s$/,'')}</div>
          <div class="h" style="font-size:${state.sec==='ows'?16:28}px;font-weight:900;margin-bottom:16px;line-height:1.3">${cfg.front(item)}</div>
          <div style="font-size:11px;opacity:.5">tap to reveal ✨</div>
        </div>
        <div class="flip-b" style="background:#1C1C2E;border:2px solid ${cfg.color}55">
          <div style="font-size:11px;font-weight:700;color:${cfg.color};margin-bottom:8px;letter-spacing:1.5px;text-transform:uppercase">${cfg.qLabel}</div>
          <div class="h" style="font-size:${state.sec==='ows'?14:22}px;font-weight:800;color:#F1F5F9;margin-bottom:10px;line-height:1.4">${cfg.back(item)}</div>
          ${item.hm ? `<div class="hm-badge"><span style="font-size:13px">🇮🇳</span><span style="font-size:12px;color:#FCD34D;font-weight:600">${item.hm}</span></div>` : ''}
        </div>
      </div>
    </div>
    <div style="display:flex;gap:12px;margin-top:20px;justify-content:center">
      <button onclick="prevFc()" ${state.fcIdx===0?'disabled':''} style="padding:11px 22px;border-radius:12px;border:1.5px solid #2D2D44;background:${state.fcIdx===0?'#16162A':'#1C1C2E'};cursor:${state.fcIdx===0?'default':'pointer'};font-size:14px;font-weight:700;color:${state.fcIdx===0?'#374151':'#E2E8F0'}">← Prev</button>
      <button onclick="flipCard()" style="padding:11px 22px;border-radius:12px;border:2px solid ${cfg.color};background:transparent;cursor:pointer;font-size:14px;font-weight:700;color:${cfg.color}">Flip 🔄</button>
      <button onclick="nextFc()" ${state.fcIdx===daily10.length-1?'disabled':''} style="padding:11px 22px;border-radius:12px;border:none;background:${state.fcIdx===daily10.length-1?'#2D2D44':cfg.color};cursor:${state.fcIdx===daily10.length-1?'default':'pointer'};font-size:14px;font-weight:700;color:#fff">Next →</button>
    </div>
    <div class="day-dots">${dots}</div>
  </div>`;
}

function renderQuiz() {
  const cfg = getCfg();
  const daily10 = getDaily10(cfg.data, state.dayIdx);
  const dayOpts = Array.from({length:11},(_,i)=>`<option value="${i}" ${i===state.dayIdx?'selected':''}>Day ${i+1}</option>`).join('');

  if (state.quizDone) {
    const pct = Math.round((state.quizScore / daily10.length) * 100);
    const star = pct >= 80 ? "🌟" : pct >= 60 ? "😊" : "💪";
    const msg = pct>=80?"🔥 CUET ke liye ready hai!":pct>=60?"💪 Accha tha! Thoda aur practice!":"📚 Keep going — practice se perfect hoga!";
    return `
    <div style="text-align:center;padding:32px 16px">
      <div style="font-size:64px;margin-bottom:16px">${star}</div>
      <div class="h" style="font-size:36px;font-weight:900;color:${cfg.color};margin-bottom:8px">${state.quizScore}/${daily10.length}</div>
      <div style="font-size:15px;color:#94A3B8;margin-bottom:6px">${pct}% Score</div>
      <div style="font-size:13px;color:#64748B;margin-bottom:28px">${msg}</div>
      <div style="background:#1C1C2E;border-radius:12px;height:10px;margin-bottom:28px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,${cfg.color},${cfg.color}99);border-radius:12px;transition:width 1.2s ease"></div>
      </div>
      <button onclick="resetQuiz()" style="background:${cfg.color};color:#fff;border:none;border-radius:12px;padding:14px 36px;font-size:15px;font-weight:700;cursor:pointer">🔄 Dobara Try Karo</button>
    </div>`;
  }

  const cur = daily10[state.quizIdx];
  const questionText = cfg.qFront ? cfg.qFront(cur) : cfg.front(cur);
  const opts = state.quizOpts;
  const labels = ['A','B','C','D'];

  const optBtns = opts.map((opt, i) => {
    const isCorrect = opt[cfg.qField] === cur[cfg.qField];
    const isSelected = state.quizSelected && opt[cfg.qField] === state.quizSelected[cfg.qField];
    let bg="#1C1C2E", border="#2D2D44", textCol="#E2E8F0";
    if (state.quizSelected) {
      if (isCorrect) { bg="#14532D"; border="#22C55E"; textCol="#BBF7D0"; }
      else if (isSelected) { bg="#7F1D1D"; border="#EF4444"; textCol="#FCA5A5"; }
    }
    const badgeBg = state.quizSelected ? (isCorrect?"#22C55E":isSelected?"#EF4444":"#2D2D44") : `${cfg.color}33`;
    const badgeIcon = state.quizSelected ? (isCorrect?"✓":isSelected?"✗":labels[i]) : labels[i];
    return `<button class="opt-btn" onclick="selectQuizOpt(${i})" ${state.quizSelected?'disabled':''} style="background:${bg};border:2px solid ${border};border-radius:14px;padding:14px 18px;text-align:left;font-size:14px;font-weight:600;color:${textCol};cursor:${state.quizSelected?'default':'pointer'};display:flex;align-items:center;gap:12px"><span style="width:28px;height:28px;border-radius:8px;background:${badgeBg};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0;color:${state.quizSelected&&(isCorrect||isSelected)?'#fff':cfg.color}">${badgeIcon}</span>${opt[cfg.qField]}</button>`;
  }).join('');

  return `
  <div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px">
      <div class="h" style="font-weight:800;font-size:17px;color:#F8FAFC">🧠 Quiz Mode</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:#64748B;font-weight:600">Day:</span>
        <select onchange="setDayQuiz(this.value)" style="border:1.5px solid ${cfg.color}44;border-radius:8px;padding:5px 10px;font-size:13px;outline:none;background:#1C1C2E;color:#F1F5F9;font-weight:600">${dayOpts}</select>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <div style="flex:1;background:#1C1C2E;border-radius:99px;height:7px;overflow:hidden"><div style="width:${(state.quizIdx/daily10.length)*100}%;height:100%;background:${cfg.color};border-radius:99px;transition:width .4s ease"></div></div>
      <span style="font-size:13px;font-weight:700;color:${cfg.color};min-width:45px;text-align:right">${state.quizIdx+1}/${daily10.length}</span>
      <span style="font-size:13px;font-weight:700;color:#22C55E;min-width:30px">✅${state.quizScore}</span>
    </div>
    <div style="background:${cfg.color}20;border-radius:20px;padding:24px;margin-bottom:16px;border:2px solid ${cfg.color}33;text-align:center">
      <div style="font-size:11px;color:${cfg.color};font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px">${state.sec==='ows'?'Ek word batao is definition ke liye':'Kya hai iska'} ${cfg.qLabel}?</div>
      <div class="h" style="font-size:${state.sec==='ows'?14:24}px;font-weight:${state.sec==='ows'?600:900};color:#F1F5F9;line-height:1.4">${questionText}</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">${optBtns}</div>
  </div>`;
}

function renderAllMode() {
  const cfg = getCfg();
  const q = state.search.trim().toLowerCase();
  const filtered = q ? cfg.data.filter(d => Object.values(d).some(v => v?.toString().toLowerCase().includes(q))) : cfg.data;

  const cards = filtered.map(item => renderWordCard(item, state.sec)).join('');
  const empty = filtered.length === 0 ? `<div style="text-align:center;padding:40px 20px;color:#4B5563"><div style="font-size:40px;margin-bottom:12px">🔍</div><div style="font-size:15px;font-weight:600">"${state.search}" ke liye kuch nahi mila</div></div>` : '';

  return `
  <div>
    <div style="position:relative;margin-bottom:16px">
      <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px">🔍</span>
      <input id="searchInput" value="${state.search.replace(/"/g,'&quot;')}" oninput="setSearch(this.value)" placeholder="Search karo — word, meaning, Hinglish…" style="width:100%;padding:11px 14px 11px 40px;border-radius:12px;border:2px solid ${cfg.color}44;font-size:14px;outline:none;background:#16162A;color:#F1F5F9"/>
      ${state.search ? `<button onclick="setSearch('')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:#64748B">✕</button>` : ''}
    </div>
    <div style="color:#64748B;font-size:13px;margin-bottom:12px;font-weight:600">${filtered.length} / 110 ${cfg.label.toLowerCase()} dikh rahe hain</div>
    <div style="display:flex;flex-direction:column;gap:12px">${cards}${empty}</div>
  </div>`;
}

function renderBookmarks() {
  const cfg = getCfg();
  const bmItems = cfg.data.filter(d => state.bookmarks[`${state.sec}-${d.id}`]);
  const cards = bmItems.map(item => renderWordCard(item, state.sec)).join('');
  const empty = bmItems.length === 0 ? `<div style="text-align:center;padding:60px 20px;color:#374151"><div style="font-size:48px;margin-bottom:12px">⭐</div><div style="font-size:16px;font-weight:600;color:#64748B;margin-bottom:8px">Abhi kuch save nahi kiya!</div><div style="font-size:13px;color:#4B5563">Kisi bhi card par ☆ dabao — save ho jaayega</div></div>` : '';
  return `
  <div>
    <div class="h" style="font-weight:800;font-size:17px;color:#F8FAFC;margin-bottom:16px">⭐ Saved ${cfg.label} (${bmItems.length})</div>
    <div style="display:flex;flex-direction:column;gap:12px">${cards}${empty}</div>
  </div>`;
}

function render() {
  const app = document.getElementById('app');
  let content = '';
  if (state.mode === 'daily') content = renderDailyMode();
  else if (state.mode === 'flashcard') content = renderFlashcard();
  else if (state.mode === 'quiz') content = renderQuiz();
  else if (state.mode === 'all') content = renderAllMode();
  else if (state.mode === 'bookmarks') content = renderBookmarks();

  app.innerHTML = `
    ${renderHeader()}
    ${renderSectionTabs()}
    ${renderModeTabs()}
    <div class="content-area">${content}</div>
    <div style="text-align:center;padding:20px 16px 36px;color:#374151;font-size:11px">CUET UG 2026 · English Language · 550 Total Items · 🇮🇳 Hinglish Support</div>
  `;

  // Re-focus search input if in all mode
  if (state.mode === 'all' && state.search) {
    const inp = document.getElementById('searchInput');
    if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  }
}

// ═══════════════════════════════════════════════════════════
//   EVENT HANDLERS
// ═══════════════════════════════════════════════════════════
function setSec(s) {
  state.sec = s; state.mode = 'daily'; state.dayIdx = 0;
  state.flipped = {}; state.fcIdx = 0; state.search = '';
  initQuiz(); render();
}

function setMode(m) {
  state.mode = m; state.flipped = {}; state.fcIdx = 0; state.search = '';
  if (m === 'quiz') initQuiz();
  render();
}

function prevDay() { if (state.dayIdx > 0) { state.dayIdx--; render(); } }
function nextDay() { if (state.dayIdx < 10) { state.dayIdx++; render(); } }
function setDay(i) { state.dayIdx = i; render(); }

function flipCard() {
  const key = `${state.sec}-${state.dayIdx}-${state.fcIdx}`;
  state.flipped[key] = !state.flipped[key];
  render();
}

function prevFc() { if (state.fcIdx > 0) { state.fcIdx--; state.flipped = {}; render(); } }
function nextFc() {
  const daily10 = getDaily10(getCfg().data, state.dayIdx);
  if (state.fcIdx < daily10.length - 1) { state.fcIdx++; state.flipped = {}; render(); }
}
function setFcIdx(i) { state.fcIdx = i; state.flipped = {}; render(); }

function setDayFlashcard(v) { state.dayIdx = +v; state.fcIdx = 0; state.flipped = {}; render(); }
function setDayQuiz(v) { state.dayIdx = +v; initQuiz(); render(); }

function selectQuizOpt(i) {
  if (state.quizSelected) return;
  const cfg = getCfg();
  const daily10 = getDaily10(cfg.data, state.dayIdx);
  const cur = daily10[state.quizIdx];
  const opt = state.quizOpts[i];
  state.quizSelected = opt;
  if (opt[cfg.qField] === cur[cfg.qField]) state.quizScore++;
  render();
  setTimeout(() => {
    if (state.quizIdx + 1 >= daily10.length) {
      state.quizDone = true;
    } else {
      state.quizIdx++;
      state.quizSelected = null;
      state.quizOpts = getQuizOptions(cfg.data, daily10[state.quizIdx], cfg.qField);
    }
    render();
  }, 1300);
}

function resetQuiz() { initQuiz(); render(); }

function toggleBookmark(key) {
  state.bookmarks[key] = !state.bookmarks[key];
  render();
}

function setSearch(val) {
  state.search = val;
  render();
}

// ═══════════════════════════════════════════════════════════
//   INIT
// ═══════════════════════════════════════════════════════════
initQuiz();
render();
</script>
</body>
</html>
