<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUET Master Quiz – 10 Days</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a14;
    --panel: #0d1a2e;
    --card: #112240;
    --accent: #00d4ff;
    --gold: #ffd700;
    --green: #00ff88;
    --red: #ff4757;
    --purple: #a855f7;
    --text: #e0f0ff;
    --muted: #7a9ab8;
    --border: rgba(0,212,255,0.2);
    --glow: 0 0 20px rgba(0,212,255,0.3);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Rajdhani',sans-serif; min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse at 20% 50%,rgba(0,60,120,0.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(100,0,180,0.1) 0%,transparent 50%); pointer-events:none; z-index:0; }
  .stars { position:fixed; inset:0; z-index:0; pointer-events:none; background-image:radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,0.6) 0%,transparent 100%),radial-gradient(1px 1px at 30% 40%,rgba(255,255,255,0.4) 0%,transparent 100%),radial-gradient(1px 1px at 50% 70%,rgba(255,255,255,0.5) 0%,transparent 100%),radial-gradient(1px 1px at 70% 25%,rgba(255,255,255,0.3) 0%,transparent 100%),radial-gradient(1px 1px at 85% 60%,rgba(255,255,255,0.6) 0%,transparent 100%),radial-gradient(1px 1px at 15% 85%,rgba(255,255,255,0.4) 0%,transparent 100%),radial-gradient(1px 1px at 60% 10%,rgba(255,255,255,0.5) 0%,transparent 100%),radial-gradient(1px 1px at 40% 90%,rgba(255,255,255,0.3) 0%,transparent 100%),radial-gradient(1px 1px at 90% 80%,rgba(255,255,255,0.4) 0%,transparent 100%),radial-gradient(1px 1px at 25% 55%,rgba(255,255,255,0.5) 0%,transparent 100%); }
  header { position:relative; z-index:10; text-align:center; padding:2rem 1rem 1.5rem; border-bottom:1px solid var(--border); background:linear-gradient(180deg,rgba(0,212,255,0.05) 0%,transparent 100%); }
  .logo-tag { display:inline-block; font-family:'Space Mono',monospace; font-size:0.65rem; color:var(--accent); letter-spacing:0.3em; border:1px solid var(--accent); padding:0.25rem 0.75rem; border-radius:2px; margin-bottom:0.75rem; animation:pulse-border 2s infinite; }
  @keyframes pulse-border { 0%,100%{box-shadow:0 0 5px rgba(0,212,255,0.3);}50%{box-shadow:0 0 15px rgba(0,212,255,0.7);} }
  h1 { font-family:'Orbitron',sans-serif; font-size:clamp(1.4rem,5vw,2.8rem); font-weight:900; background:linear-gradient(135deg,#00d4ff,#a855f7,#ffd700); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1.1; margin-bottom:0.5rem; }
  .subtitle { font-size:0.95rem; color:var(--muted); font-family:'Space Mono',monospace; }
  .progress-strip { position:relative; z-index:10; background:var(--panel); padding:1rem 1.5rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:1rem; flex-wrap:wrap; }
  .score-display { font-family:'Orbitron',sans-serif; font-size:1.1rem; color:var(--gold); }
  .progress-bar-wrap { flex:1; min-width:150px; height:6px; background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--purple)); border-radius:3px; transition:width 0.5s cubic-bezier(0.4,0,0.2,1); box-shadow:0 0 8px rgba(0,212,255,0.5); }
  .q-counter { font-family:'Space Mono',monospace; font-size:0.8rem; color:var(--muted); white-space:nowrap; }
  .day-nav { position:relative; z-index:10; display:flex; gap:0.4rem; padding:1rem 1.5rem; overflow-x:auto; border-bottom:1px solid var(--border); background:var(--panel); }
  .day-nav::-webkit-scrollbar{height:3px;} .day-nav::-webkit-scrollbar-track{background:rgba(255,255,255,0.05);} .day-nav::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px;}
  .day-btn { flex-shrink:0; font-family:'Orbitron',sans-serif; font-size:0.6rem; padding:0.4rem 0.7rem; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:4px; color:var(--muted); cursor:pointer; transition:all 0.2s; position:relative; }
  .day-btn:hover{border-color:var(--accent);color:var(--accent);}
  .day-btn.active{background:linear-gradient(135deg,rgba(0,212,255,0.2),rgba(168,85,247,0.2));border-color:var(--accent);color:var(--accent);box-shadow:var(--glow);}
  .day-btn.completed::after{content:'✓';position:absolute;top:-5px;right:-5px;background:var(--green);color:#000;font-size:0.55rem;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;}
  main { position:relative; z-index:10; max-width:860px; margin:0 auto; padding:1.5rem 1rem 5rem; }
  .section-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1.2rem; margin-top:1.5rem; }
  .section-icon { width:38px; height:38px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; }
  .ca-icon{background:linear-gradient(135deg,#0040a0,#0080ff);}
  .gk-icon{background:linear-gradient(135deg,#5500aa,#a855f7);}
  .section-title{font-family:'Orbitron',sans-serif;font-size:0.8rem;letter-spacing:0.15em;}
  .ca-section .section-title{color:var(--accent);}
  .gk-section .section-title{color:var(--purple);}
  .q-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.25rem; margin-bottom:1rem; transition:all 0.3s; position:relative; overflow:hidden; }
  .q-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--accent),var(--purple));border-radius:3px 0 0 3px;}
  .gk-section .q-card::before{background:linear-gradient(180deg,var(--purple),#ff6b9d);}
  .q-card.correct{border-color:var(--green);background:rgba(0,255,136,0.05);}
  .q-card.wrong{border-color:var(--red);background:rgba(255,71,87,0.05);}
  .q-num{font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--muted);margin-bottom:0.5rem;}
  .q-text{font-size:1.05rem;font-weight:600;line-height:1.5;color:var(--text);margin-bottom:1rem;}
  .options{display:grid;gap:0.5rem;}
  .opt{display:flex;align-items:center;gap:0.75rem;padding:0.7rem 1rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;cursor:pointer;transition:all 0.2s;font-size:0.95rem;}
  .opt:hover:not(.disabled){background:rgba(0,212,255,0.08);border-color:rgba(0,212,255,0.3);transform:translateX(3px);}
  .opt.selected{border-color:var(--accent);background:rgba(0,212,255,0.12);}
  .opt.correct-opt{background:rgba(0,255,136,0.12);border-color:var(--green);color:var(--green);}
  .opt.wrong-opt{background:rgba(255,71,87,0.12);border-color:var(--red);color:var(--red);}
  .opt.disabled{cursor:not-allowed;}
  .opt-letter{font-family:'Orbitron',sans-serif;font-size:0.65rem;width:22px;height:22px;border-radius:4px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
  .correct-opt .opt-letter{background:var(--green);color:#000;}
  .wrong-opt .opt-letter{background:var(--red);color:#fff;}
  .answer-panel{margin-top:1rem;padding:1rem;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);display:none;animation:slideDown 0.3s ease;}
  .answer-panel.show{display:block;}
  @keyframes slideDown{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
  .answer-label{font-family:'Orbitron',sans-serif;font-size:0.6rem;letter-spacing:0.15em;color:var(--gold);margin-bottom:0.5rem;}
  .answer-explain{font-size:0.9rem;color:#bdd0e8;line-height:1.6;margin-bottom:0.75rem;}
  .trick-box{padding:0.75rem 1rem;border-radius:8px;background:linear-gradient(135deg,rgba(255,215,0,0.06),rgba(255,107,157,0.06));border:1px solid rgba(255,215,0,0.2);display:flex;gap:0.6rem;align-items:flex-start;}
  .trick-emoji{font-size:1.2rem;flex-shrink:0;}
  .trick-title{font-family:'Orbitron',sans-serif;font-size:0.55rem;letter-spacing:0.15em;color:var(--gold);margin-bottom:0.25rem;}
  .trick-text{font-size:0.88rem;color:var(--gold);font-weight:600;line-height:1.5;}
  .btn-row{display:flex;gap:0.5rem;margin-top:0.75rem;flex-wrap:wrap;}
  .btn{font-family:'Rajdhani',sans-serif;font-size:0.85rem;font-weight:700;padding:0.45rem 1rem;border-radius:6px;border:1px solid;cursor:pointer;transition:all 0.2s;letter-spacing:0.05em;}
  .btn-check{background:linear-gradient(135deg,rgba(0,212,255,0.2),rgba(168,85,247,0.2));border-color:var(--accent);color:var(--accent);}
  .btn-check:hover{background:linear-gradient(135deg,rgba(0,212,255,0.35),rgba(168,85,247,0.35));}
  .btn-check:disabled{opacity:0.4;cursor:not-allowed;}
  #result-screen{display:none;text-align:center;padding:3rem 1rem;}
  .result-emoji{font-size:4rem;margin-bottom:1rem;animation:bounce 1s infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
  .result-title{font-family:'Orbitron',sans-serif;font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0.5rem;}
  .result-score{font-size:3rem;font-family:'Orbitron',sans-serif;color:var(--gold);margin:1rem 0;}
  .result-msg{color:var(--muted);font-size:1rem;margin-bottom:2rem;}
  .result-bars{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:2rem;}
  .r-bar{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem 1.5rem;min-width:140px;}
  .r-bar-val{font-family:'Orbitron',sans-serif;font-size:1.5rem;color:var(--accent);margin-bottom:0.25rem;}
  .r-bar-label{font-size:0.85rem;color:var(--muted);}
  .btn-next-day{font-family:'Orbitron',sans-serif;font-size:0.8rem;padding:0.75rem 2rem;background:linear-gradient(135deg,var(--accent),var(--purple));border:none;border-radius:8px;color:#000;font-weight:700;cursor:pointer;transition:all 0.3s;letter-spacing:0.1em;box-shadow:0 4px 20px rgba(0,212,255,0.3);}
  .btn-next-day:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,212,255,0.5);}
  .streak-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:center;gap:1rem;padding:0.6rem;background:linear-gradient(90deg,rgba(255,215,0,0.05),rgba(255,107,157,0.05));border-bottom:1px solid rgba(255,215,0,0.1);font-family:'Space Mono',monospace;font-size:0.75rem;color:var(--gold);}
  @media(max-width:500px){.q-text{font-size:0.95rem;}.opt{font-size:0.85rem;}h1{font-size:1.4rem;}}
  .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1.5rem;font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,0.5);}
  .toast.show{opacity:1;}
  .toast.green{border-color:var(--green);color:var(--green);}
  .toast.red{border-color:var(--red);color:var(--red);}
  .tag-ca{display:inline-block;font-family:'Space Mono',monospace;font-size:0.55rem;background:rgba(0,212,255,0.15);border:1px solid rgba(0,212,255,0.4);color:var(--accent);padding:0.15rem 0.5rem;border-radius:3px;margin-bottom:0.4rem;letter-spacing:0.1em;}
  .tag-gk{display:inline-block;font-family:'Space Mono',monospace;font-size:0.55rem;background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.4);color:var(--purple);padding:0.15rem 0.5rem;border-radius:3px;margin-bottom:0.4rem;letter-spacing:0.1em;}
</style>
</head>
<body>
<div class="stars"></div>
<header>
  <div class="logo-tag">CUET MASTER PREP · 10 DAYS · 2026</div>
  <h1>CUET DAILY QUIZ</h1>
  <div class="subtitle">10 Current Affairs (May 2025–May 2026) + 10 Static GK · Memory Tricks · English</div>
</header>
<div class="streak-bar">
  <span>🔥 Streak:</span><span id="streak-count">0 Days</span>
  <span>|</span>
  <span>🏆 Best:</span><span id="best-score">—</span>
</div>
<div class="progress-strip">
  <div class="score-display">⚡ <span id="score-now">0</span> pts</div>
  <div class="progress-bar-wrap"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="q-counter" id="q-counter">0 / 20</div>
</div>
<div class="day-nav" id="day-nav"></div>
<main id="quiz-main"></main>
<div id="result-screen">
  <div class="result-emoji" id="r-emoji">🎉</div>
  <div class="result-title">DAY COMPLETE!</div>
  <div class="result-score"><span id="r-score">0</span> / 20</div>
  <div class="result-msg" id="r-msg"></div>
  <div class="result-bars">
    <div class="r-bar"><div class="r-bar-val" id="r-ca">0</div><div class="r-bar-label">Current Affairs</div></div>
    <div class="r-bar"><div class="r-bar-val" id="r-gk">0</div><div class="r-bar-label">Static GK</div></div>
    <div class="r-bar"><div class="r-bar-val" id="r-acc">0%</div><div class="r-bar-label">Accuracy</div></div>
  </div>
  <button class="btn-next-day" id="next-day-btn">NEXT DAY →</button>
</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
//  CUET MASTER QUIZ — 10 Days × 20 Qs (10 CA + 10 GK)
//  CA: May 2025 – May 2026 | GK: Static (CUET 2022-2025 trend analysis)
// ============================================================
const DAYS = [

// ─── DAY 1 ── Current Affairs: May–Aug 2025 | GK: Polity & History ──
{day:1,
 ca:[
  {q:"In April–May 2025, which Indian military operation was launched against Pakistan following the Pahalgam terror attack?",opts:["Operation Sindoor","Operation Ganga","Operation Prahar","Operation Vijay"],ans:0,explain:"Operation Sindoor was launched by India on May 7, 2025 — precision strikes on 9 terror infrastructure sites in Pakistan and PoK, following the Pahalgam attack (April 22, 2025) that killed 26 tourists.",trick:"🎯 Sindoor = India drew a RED line. S = Strike back!"},
  {q:"The Pahalgam terror attack (April 22, 2025) took place in which specific valley of Jammu & Kashmir?",opts:["Baisaran Valley","Lidder Valley","Kashmir Valley","Chenab Valley"],ans:0,explain:"The attack occurred in Baisaran Valley, Pahalgam — a meadow tourist spot nicknamed 'Mini Switzerland' in the Anantnag district.",trick:"🏔 Baisaran = Beautiful + Scarred. B-B: Beautiful meadow, Black day."},
  {q:"India signed a Free Trade Agreement (FTA) with which country in May 2025, its first FTA with a major European nation?",opts:["United Kingdom","Germany","France","Italy"],ans:0,explain:"India–UK FTA was finalised in May 2025 after 3+ years of negotiations, covering goods, services, mobility, and investments.",trick:"🫖 UK = Tea + Trade! India-UK FTA = Forever Trade Alliance!"},
  {q:"Which country held the G20 Presidency in 2025, hosting the summit in Johannesburg?",opts:["South Africa","Brazil","Indonesia","Saudi Arabia"],ans:0,explain:"South Africa held the G20 Presidency in 2025. Brazil had it in 2024; India had it in 2023.",trick:"🌍 SA 2025 → Brazil 2024 → India 2023. Go backwards: S-B-I!"},
  {q:"ISRO's SpaDeX mission (Space Docking Experiment), successfully demonstrated India's first in-space docking in early 2025. What is the significance?",opts:["Key for future Indian Space Station","Mars mission prep","Moon water search","GPS satellite deployment"],ans:0,explain:"SpaDeX demonstrated autonomous docking of two spacecraft in orbit — essential technology for India's planned Bharatiya Antariksha Station (BAS) by 2035.",trick:"🛸 SpaDeX = SPACE + DOCKING eXperiment. Dock = connect = future station!"},
  {q:"The Unified Pension Scheme (UPS) was implemented from which date for central government employees?",opts:["April 1, 2025","January 1, 2025","April 1, 2026","October 1, 2024"],ans:0,explain:"UPS was approved in August 2024 and operationalised from April 1, 2025, blending features of Old Pension Scheme and NPS.",trick:"📅 UPS starts April 1, 2025. U-P-S = United Pension Started!"},
  {q:"India's 'Atal Setu', the longest sea bridge in India connecting Mumbai to Navi Mumbai, spans approximately how many km?",opts:["21.8 km","15 km","30 km","12 km"],ans:0,explain:"Atal Setu (Mumbai Trans Harbour Link) is 21.8 km long, opened January 12, 2024 — India's longest sea bridge.",trick:"🌉 21.8 km = TWO-ONE-EIGHT! Atal = Stable. ATS = Always The Shortest route!"},
  {q:"Which country became the first new member to formally join BRICS as a full member in 2024, along with UAE, Egypt, Ethiopia and Saudi Arabia?",opts:["Iran","Turkey","Indonesia","Argentina"],ans:0,explain:"Iran, UAE, Egypt, Ethiopia, and Saudi Arabia all joined BRICS as full members in January 2024. Argentina declined its invitation.",trick:"🤝 BRICS+5! Iran + Egypt + UAE + Ethiopia + SA = Five New Friends!"},
  {q:"India's 'Mission Mausam' aims to upgrade which sector using AI and next-generation Doppler radars?",opts:["Weather & climate forecasting","Solar energy","River water management","Earthquake detection"],ans:0,explain:"Mission Mausam (2024) aims to revolutionise India's meteorological infrastructure with AI-driven radars and observation networks under MoES.",trick:"🌦 Mausam = WEATHER! Mission Mausam = Mega Met Makeover!"},
  {q:"Which Indian state first implemented the Uniform Civil Code (UCC) in 2024, becoming the first state to do so after Goa?",opts:["Uttarakhand","Gujarat","UP","Himachal Pradesh"],ans:0,explain:"Uttarakhand notified its UCC rules in 2024, making it the first state (after Goa which had its own version) to implement a comprehensive UCC.",trick:"🏔 Uttarakhand = UK = Uniform King! Mountain state leads UCC!"},
 ],
 gk:[
  {q:"Fundamental Rights in the Indian Constitution are enshrined in which Articles?",opts:["Articles 12–35","Articles 1–11","Articles 36–51","Articles 52–78"],ans:0,explain:"Fundamental Rights are in Articles 12–35, Part III of the Constitution. They are justiciable — enforceable by courts.",trick:"📖 12 to 35: Remember '12 pe shuru, 35 pe khatam' = Part III Rights!"},
  {q:"Under which Article of the Indian Constitution can the President impose National Emergency?",opts:["Article 352","Article 356","Article 360","Article 368"],ans:0,explain:"Article 352 allows the President to proclaim National Emergency (threat to India's security by war/armed rebellion/external aggression).",trick:"🚨 352 = Three Five Two = Threat! 352 → National Emergency!"},
  {q:"Which Mughal Emperor built the Taj Mahal, and in which year was it completed?",opts:["Shah Jahan, 1653","Akbar, 1600","Aurangzeb, 1670","Jahangir, 1620"],ans:0,explain:"Shah Jahan built the Taj Mahal in memory of wife Mumtaz Mahal. Construction began 1632, completed ~1653.",trick:"🕌 Shah Jahan = Shaadi + Jaan! Built for love. SJ + TM = 1653!"},
  {q:"The Indian National Congress was founded in 1885 by which British civil servant?",opts:["A.O. Hume","William Bentinck","Dalhousie","Ripon"],ans:0,explain:"Allan Octavian Hume (A.O. Hume) founded the INC in Bombay (Mumbai) in 1885. First session presided over by W.C. Bonnerjee.",trick:"🕊 A.O. Hume = A One Humble founder! 1885 = first step to freedom!"},
  {q:"'Quit India Movement' was launched by Mahatma Gandhi in which year, with the famous call 'Do or Die'?",opts:["1942","1930","1919","1947"],ans:0,explain:"Quit India Movement was launched on August 8, 1942 at Bombay. Gandhi gave the 'Do or Die' slogan.",trick:"✊ 1942 = 9+4+2 = 15! '42 = QUIT + FIGHT! Do or Die = 1942!"},
  {q:"The Preamble to the Indian Constitution describes India as 'Sovereign Socialist Secular Democratic Republic'. Which amendment added 'Socialist' and 'Secular'?",opts:["42nd Amendment, 1976","44th Amendment","74th Amendment","86th Amendment"],ans:0,explain:"The 42nd Constitutional Amendment (1976) added the words 'Socialist', 'Secular', and 'Integrity' to the Preamble.",trick:"🔑 42nd = SOCIALIST + SECULAR added! 42 = 4+2 = 6 words in Preamble key!"},
  {q:"Who wrote the Indian national song 'Vande Mataram', and in which novel did it first appear?",opts:["Bankim Chandra Chattopadhyay, Anandamath","Rabindranath Tagore, Gitanjali","Subramania Bharati, Kavithai","Sarojini Naidu, Golden Threshold"],ans:0,explain:"Bankim Chandra wrote Vande Mataram; it first appeared in his 1882 novel Anandamath. Adopted as national song in 1950.",trick:"🌸 B-C-C = Bankim Chandra Chattopadhyay = BCC! Vande = Victory-BCC!"},
  {q:"The Battle of Plassey (1757) was fought between the British East India Company and whom?",opts:["Siraj ud-Daulah (Nawab of Bengal)","Hyder Ali","Tipu Sultan","Marathas"],ans:0,explain:"Battle of Plassey (June 23, 1757) — Clive vs Siraj ud-Daulah (last independent Nawab of Bengal). British victory led to colonial domination.",trick:"⚔️ Plassey 1757 = P-L-A-S-S-E-Y = Please Lose And Submit Siraj Easily Yes!"},
  {q:"Which Article of the Indian Constitution abolishes untouchability?",opts:["Article 17","Article 14","Article 21","Article 19"],ans:0,explain:"Article 17 abolishes untouchability and forbids its practice in any form. It is a non-derogable right.",trick:"🤝 17 = UNTOUCHABILITY abolished! 1+7=8 = equality for all!"},
  {q:"The 'Directive Principles of State Policy' (DPSP) in the Indian Constitution are inspired by which country's constitution?",opts:["Ireland","USA","UK","France"],ans:0,explain:"DPSP (Articles 36–51) are borrowed from the Irish Constitution of 1937. They are non-justiciable but fundamental to governance.",trick:"🍀 Ireland = Ire + land = Ideas for DPSP! I = Ireland = Inspired DPSP!"},
 ]
},

// ─── DAY 2 ── CA: Sep–Dec 2025 | GK: Geography & Environment ──
{day:2,
 ca:[
  {q:"The 79th United Nations General Assembly (UNGA) session in 2024 was addressed by India's PM Modi with the theme 'Summit of the Future'. What was the key India proposal?",opts:["Comprehensive reform of UN Security Council","Abolish nuclear weapons","Free trade for developing nations","Global AI treaty"],ans:0,explain:"India strongly pushed for UNSC reform including permanent membership for developing nations at UNGA 79th session in September 2024.",trick:"🌐 UNSC reform = India's Big Ask! UN = Unfair → India = Improve Now!"},

// ============================================================
//  ENGINE
// ============================================================
let state = JSON.parse(localStorage.getItem('cuet_quiz_state') || 'null') || {
  currentDay: 0,
  answers: {},  // dayIdx -> { qIdx -> selectedOpt }
  scores: {},   // dayIdx -> score
  streak: 0,
  bestScore: 0
};

function saveState() {
  localStorage.setItem('cuet_quiz_state', JSON.stringify(state));
}

function renderDayNav() {
  const nav = document.getElementById('day-nav');
  nav.innerHTML = '';
  DAYS.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (i === state.currentDay ? ' active' : '') + (state.scores[i] !== undefined ? ' completed' : '');
    btn.textContent = `DAY ${d.day}`;
    btn.onclick = () => { state.currentDay = i; saveState(); renderQuiz(); };
    nav.appendChild(btn);
  });
}

function renderQuiz() {
  renderDayNav();
  document.getElementById('result-screen').style.display = 'none';
  const main = document.getElementById('quiz-main');
  const day = DAYS[state.currentDay];
  const dayAnswers = state.answers[state.currentDay] || {};

  // Update streak/best
  document.getElementById('streak-count').textContent = state.streak + ' Days';
  document.getElementById('best-score').textContent = state.bestScore ? state.bestScore + '/20' : '—';

  // Calculate current score
  let score = 0, caScore = 0, gkScore = 0;
  day.ca.forEach((q, i) => { if (dayAnswers[i] === q.ans) { score++; caScore++; } });
  day.gk.forEach((q, i) => { if (dayAnswers[i + 10] === q.ans) { score++; gkScore++; } });

  const answered = Object.keys(dayAnswers).length;
  document.getElementById('score-now').textContent = score;
  document.getElementById('q-counter').textContent = answered + ' / 20';
  document.getElementById('prog-fill').style.width = (answered / 20 * 100) + '%';

  // Build HTML
  let html = '';

  // CA Section
  html += `<div class="section-header ca-section"><div class="section-icon ca-icon">📰</div><div><div class="section-title">CURRENT AFFAIRS</div><div style="font-size:0.75rem;color:var(--muted)">May 2025 – May 2026 · Hot for CUET 2026</div></div></div>`;
  day.ca.forEach((q, qi) => {
    html += buildCard(q, qi, dayAnswers[qi], false);
  });

  // GK Section
  html += `<div class="section-header gk-section"><div class="section-icon gk-icon">📚</div><div><div class="section-title">STATIC GENERAL KNOWLEDGE</div><div style="font-size:0.75rem;color:var(--muted)">CUET 2022–2025 Trend Analysis</div></div></div>`;
  day.gk.forEach((q, qi) => {
    html += buildCard(q, qi + 10, dayAnswers[qi + 10], true);
  });

  main.innerHTML = html;

  // Check if all answered → show result
  if (answered === 20 && state.scores[state.currentDay] === undefined) {
    setTimeout(() => showResult(score, caScore, gkScore), 600);
  }
}

function buildCard(q, qi, selectedOpt, isGk) {
  const answered = selectedOpt !== undefined;
  const correct = answered && selectedOpt === q.ans;
  let cardClass = 'q-card' + (answered ? (correct ? ' correct' : ' wrong') : '');
  const letters = ['A', 'B', 'C', 'D'];

  let optsHtml = q.opts.map((opt, oi) => {
    let cls = 'opt';
    if (answered) {
      cls += ' disabled';
      if (oi === q.ans) cls += ' correct-opt';
      else if (oi === selectedOpt && oi !== q.ans) cls += ' wrong-opt';
    }
    return `<div class="${cls}" onclick="selectAnswer(${qi},${oi})">
      <span class="opt-letter">${letters[oi]}</span>
      <span>${opt}</span>
    </div>`;
  }).join('');

  let answerPanel = '';
  if (answered) {
    answerPanel = `<div class="answer-panel show">
      <div class="answer-label">✦ EXPLANATION</div>
      <div class="answer-explain">${q.explain}</div>
      <div class="trick-box">
        <span class="trick-emoji">🧠</span>
        <div class="trick-content">
          <div class="trick-title">MEMORY TRICK</div>
          <div class="trick-text">${q.trick}</div>
        </div>
      </div>
    </div>`;
  }

  const tagClass = isGk ? 'tag-gk' : 'tag-ca';
  const tagText = isGk ? 'STATIC GK' : 'CURRENT AFFAIRS';
  const qNum = isGk ? (qi - 9) : (qi + 1);

  return `<div class="${cardClass}" id="card-${qi}">
    <div class="q-num">
      <span class="${tagClass}">${tagText}</span>
      &nbsp; Q${qNum}
    </div>
    <div class="q-text">${q.q}</div>
    <div class="options">${optsHtml}</div>
    ${answerPanel}
  </div>`;
}

function selectAnswer(qi, oi) {
  if (!state.answers[state.currentDay]) state.answers[state.currentDay] = {};
  if (state.answers[state.currentDay][qi] !== undefined) return; // already answered

  state.answers[state.currentDay][qi] = oi;
  saveState();

  const q = qi < 10 ? DAYS[state.currentDay].ca[qi] : DAYS[state.currentDay].gk[qi - 10];
  const correct = oi === q.ans;

  showToast(correct ? '✓ Correct! +1 Point' : '✗ Wrong! Check explanation', correct ? 'green' : 'red');
  renderQuiz();
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 2000);
}

function showResult(score, caScore, gkScore) {
  const acc = Math.round(score / 20 * 100);
  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('r-score').textContent = score;
  document.getElementById('r-ca').textContent = caScore + '/10';
  document.getElementById('r-gk').textContent = gkScore + '/10';
  document.getElementById('r-acc').textContent = acc + '%';

  const msgs = [
    ['😢', 'Keep going! Review explanations and try again!'],
    ['😐', 'Getting there! Focus on weak areas.'],
    ['🙂', 'Decent effort! You can improve more.'],
    ['😊', 'Good work! CUET is within reach!'],
    ['🚀', 'Excellent! You are CUET-ready!'],
    ['🏆', 'PERFECT SCORE! Unstoppable genius!']
  ];
  const tier = Math.min(5, Math.floor(score / 4));
  document.getElementById('r-emoji').textContent = msgs[tier][0];
  document.getElementById('r-msg').textContent = msgs[tier][1];

  if (state.scores[state.currentDay] === undefined) {
    state.scores[state.currentDay] = score;
    if (score > state.bestScore) state.bestScore = score;
    // Update streak
    const daysDone = Object.keys(state.scores).length;
    state.streak = Math.max(state.streak, daysDone);
    saveState();
  }

  document.getElementById('next-day-btn').textContent =
    state.currentDay < DAYS.length - 1 ? `NEXT DAY →` : 'RESTART ALL DAYS 🔄';
  document.querySelector('main').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
}

document.getElementById('next-day-btn').onclick = () => {
  if (state.currentDay < DAYS.length - 1) {
    state.currentDay++;
  } else {
    // Reset all
    state = { currentDay: 0, answers: {}, scores: {}, streak: 0, bestScore: 0 };
  }
  saveState();
  document.querySelector('main').style.display = 'block';
  renderQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

// Init
renderQuiz();
</script>
</body>
</html>
