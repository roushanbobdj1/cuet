<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUET GK Master 2026</title>

<style>
:root{
  --bg:#070712;--card:#0E0E1E;--border:#1C1C38;
  --text:#F0F4FF;--sub:#6B7A99;
  --gk:#F59E0B;--ca:#22D3EE;--sci:#4ADE80;
  --hm:#FCD34D;--red:#F87171;--green:#34D399;
  --ff-h:'Syne',sans-serif;--ff-b:'Manrope',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--ff-b);background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(245,158,11,.06) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(34,211,238,.05) 0%,transparent 60%);pointer-events:none;z-index:0}
#app{position:relative;z-index:1}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#1C1C38;border-radius:4px}

/* HEADER */
.hdr{background:linear-gradient(135deg,#0A0A1E,#12122E);padding:14px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.hdr-inner{max-width:750px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.logo{font-family:var(--ff-h);font-size:20px;font-weight:900;letter-spacing:-.5px}
.logo span{background:linear-gradient(90deg,#F59E0B,#22D3EE,#4ADE80);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid;white-space:nowrap}

/* SECTION TABS */
.sec-tabs{background:#09091A;border-bottom:1px solid var(--border);overflow-x:auto}
.sec-tabs-inner{max-width:750px;margin:0 auto;display:flex;padding:0 12px;min-width:max-content}
.sec-btn{padding:13px 16px;border:none;background:none;cursor:pointer;font-family:var(--ff-b);font-size:13px;font-weight:600;color:var(--sub);border-bottom:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.sec-btn.active{color:var(--ac);border-bottom-color:var(--ac)}

/* MODE TABS */
.mode-tabs{background:#09091A;border-bottom:1px solid var(--border);padding:10px 16px;overflow-x:auto}
.mode-tabs-inner{max-width:750px;margin:0 auto;display:flex;gap:8px;min-width:max-content}
.mode-btn{padding:7px 15px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--sub);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--ff-b);transition:all .2s;white-space:nowrap}
.mode-btn.active{border-color:var(--ac);background:var(--ac);color:#000}

/* CONTENT */
.content{max-width:750px;margin:0 auto;padding:16px}

/* STUDY CARD */
.study-card{background:var(--card);border-radius:18px;padding:18px 20px;border:1.5px solid var(--border);position:relative;margin-bottom:12px;transition:transform .2s,box-shadow .2s}
.study-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.card-num{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.card-top{display:flex;align-items:flex-start;gap:11px;margin-bottom:12px}
.cat-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border:1px solid;margin-bottom:6px}
.question{font-size:14px;font-weight:600;color:#CBD5E1;line-height:1.5;padding-right:36px}
.ans-box{padding:10px 14px;border-radius:10px;margin-bottom:8px}
.ans-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.ans-text{font-family:var(--ff-h);font-size:15px;font-weight:700;color:var(--text)}
.hm-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(252,211,77,.08);border:1px solid rgba(252,211,77,.2);border-radius:8px;padding:6px 10px;margin-top:6px}
.hm-text{font-size:12px;color:var(--hm);font-weight:600;line-height:1.4}
.bm-btn{position:absolute;top:14px;right:14px;background:none;border:none;cursor:pointer;font-size:18px;line-height:1;padding:4px}

/* FLASHCARD */
.flip-wrap{perspective:1400px;width:100%;cursor:pointer;user-select:none;margin-bottom:20px}
.flip-inner{transition:transform .55s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;position:relative;min-height:260px;width:100%}
.flip-inner.flipped{transform:rotateY(180deg)}
.flip-f,.flip-b{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px;text-align:center;border:1.5px solid var(--border)}
.flip-b{transform:rotateY(180deg);background:var(--card)}

/* QUIZ */
.quiz-progress{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.prog-bar{flex:1;background:var(--border);border-radius:99px;height:7px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .4s ease}
.q-card{border-radius:20px;padding:24px;margin-bottom:16px;border:2px solid;text-align:center}
.q-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
.q-text{font-family:var(--ff-h);font-size:18px;font-weight:700;line-height:1.4;color:var(--text)}
.opts{display:flex;flex-direction:column;gap:10px}
.opt-btn{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:13px 16px;text-align:left;font-size:14px;font-weight:600;color:#CBD5E1;cursor:pointer;font-family:var(--ff-b);display:flex;align-items:center;gap:12px;transition:all .2s}
.opt-btn:hover:not([disabled]){transform:translateX(4px)}
.opt-btn.correct{background:#052E16;border-color:var(--green);color:#86EFAC}
.opt-btn.wrong{background:#2D0A0A;border-color:var(--red);color:#FCA5A5}
.opt-letter{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0}
.result-box{text-align:center;padding:32px 16px}
.result-emoji{font-size:72px;margin-bottom:16px}
.result-score{font-family:var(--ff-h);font-size:40px;font-weight:900;margin-bottom:6px}
.result-pct{font-size:14px;color:var(--sub);margin-bottom:24px}
.result-bar{background:var(--border);border-radius:12px;height:10px;overflow:hidden;margin-bottom:28px}
.result-fill{height:100%;border-radius:12px;transition:width 1.2s ease}
.retry-btn{padding:13px 36px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--ff-b)}

/* DAY CONTROLS */
.day-ctrl{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.day-title{font-family:var(--ff-h);font-size:17px;font-weight:800;color:var(--text)}
.day-nav{display:flex;gap:8px}
.nav-btn{padding:7px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--ff-b);border:1.5px solid;transition:all .2s}
.day-dots{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.day-dot{width:34px;height:34px;border-radius:9px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--ff-b);transition:all .2s}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:16px}
.search-wrap span{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px}
.search-input{width:100%;padding:11px 40px;border-radius:12px;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:14px;font-family:var(--ff-b);outline:none}
.search-input:focus{border-color:var(--ac)}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--sub)}
.search-count{font-size:13px;font-weight:600;color:var(--sub);margin-bottom:12px}

/* BOOKMARKS EMPTY */
.empty-box{text-align:center;padding:60px 20px;color:var(--sub)}
.empty-emoji{font-size:48px;margin-bottom:12px}

/* ANIMATIONS */
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.slide-up{animation:slideUp .35s ease both}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.pop{animation:pop .25s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.shake{animation:shake .3s ease}

/* FLASH NAV */
.flash-nav{display:flex;gap:12px;justify-content:center;margin-top:18px}
.flash-btn{padding:11px 22px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--ff-b);transition:all .2s}
.flash-dots{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.flash-dot{width:10px;height:10px;border-radius:50%;cursor:pointer;transition:all .2s}
.flash-day-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;justify-content:flex-end}
.day-select{border-radius:8px;padding:5px 10px;font-size:13px;font-family:var(--ff-b);outline:none;font-weight:600}
.flash-counter{text-align:center;font-size:13px;font-weight:700;margin-bottom:10px}
</style>
</head>

  return shuffle([item.a,...w]);
}

      </div>
      <div class="hdr-badges">
        <div class="badge" style="color:${ac()};border-color:${ac()}22;background:${ac()}11">⭐ ${totalBm} Saved</div>
        <div class="badge" style="color:#94A3B8;border-color:#1C1C38">📅 Day ${state.day+1}/11</div>
      </div>
    </div>
  </div>`;

  // Section Tabs
  html+=`<div class="sec-tabs"><div class="sec-tabs-inner">`;
  Object.entries(SECTIONS).forEach(([k,c])=>{
    const active=state.sec===k;
    html+=`<button class="sec-btn ${active?"active":""}" data-sec="${k}" style="--ac:${c.color};${active?"color:"+c.color:""}">
      ${c.icon} ${c.short}
    </button>`;
  });
  html+=`</div></div>`;

  // Mode Tabs
  const modes={study:"📖 Study",flash:"🃏 Flashcard",quiz:"🧠 Quiz",all:"📋 Sab 110",bookmarks:`⭐ Saved (${bmItems.length})`};
  html+=`<div class="mode-tabs"><div class="mode-tabs-inner" style="--ac:${ac()}">`;
  Object.entries(modes).forEach(([k,label])=>{
    const active=state.mode===k;
    html+=`<button class="mode-btn ${active?"active":""}" data-mode="${k}">${label}</button>`;
  });
  html+=`</div></div>`;

  // Content
  html+=`<div class="content">`;

  if(state.mode==="study"){
    html+=buildDayHeader(daily10);
    html+=daily10.map(item=>buildStudyCard(item,cfg)).join("");
  } else if(state.mode==="flash"){
    html+=buildFlashMode(daily10,cfg);
  } else if(state.mode==="quiz"){
    html+=buildQuizMode(cfg);
  } else if(state.mode==="all"){
    html+=buildAllMode(cfg);
  } else if(state.mode==="bookmarks"){
    html+=buildBookmarksMode(bmItems,cfg);
  }

  html+=`</div>
  <div style="text-align:center;padding:18px 0 36px;font-size:11px;color:#1E293B">
    CUET UG 2026 · 330 Total Items · 🇮🇳 Hinglish Support
  </div>`;
  return html;
}

function buildDayHeader(daily10){
  const c=ac();
  return `
  <div class="day-ctrl">
    <div class="day-title">${SECTIONS[state.sec].icon} Day ${state.day+1} — Q${state.day*10+1}–${state.day*10+10}</div>
    <div class="day-nav">
      <button class="nav-btn" data-action="prev-day" style="border-color:${state.day===0?"#1C1C38":"#2D3748"};color:${state.day===0?"#374151":"#CBD5E1"};background:${state.day===0?"#0E0E1E":"#12122A"}" ${state.day===0?"disabled":""}>← Prev</button>
      <button class="nav-btn" data-action="next-day" style="border-color:transparent;background:${state.day===10?"#1C1C38":c};color:${state.day===10?"#374151":"#000"}" ${state.day===10?"disabled":""}>Next →</button>
    </div>
  </div>
  <div class="day-dots">
    ${Array.from({length:11},(_,i)=>`<button class="day-dot" data-day="${i}" style="background:${i===state.day?c:i<state.day?c+"44":"#1C1C2E"};color:${i===state.day?"#000":i<state.day?c:"#475569"}">${i+1}</button>`).join("")}
  </div>`;
}

function buildStudyCard(item,cfg){
  const key=state.sec+"-"+item.id;
  const bm=state.bookmarks.has(key);
  const c=cfg.color;
  return `
  <div class="study-card slide-up">
    <button class="bm-btn" data-bm="${key}">${bm?"⭐":"☆"}</button>
    <div class="card-top">
      <div class="card-num" style="background:${c}18;color:${c}">${String(item.id).padStart(2,"0")}</div>
      <div style="flex:1;padding-right:28px">
        <div class="cat-badge" style="color:${c};border-color:${c}33;background:${c}0D">${item.c}</div>
        <div class="question">${item.q}</div>
      </div>
    </div>
    <div class="ans-box" style="background:${c}14">
      <div class="ans-label" style="color:${c}">Uttar (Answer)</div>
      <div class="ans-text">${item.a}</div>
    </div>
    <div class="hm-badge">
      <span style="font-size:14px">🇮🇳</span>
      <span class="hm-text">${item.h}</span>
    </div>
  </div>`;
}

function buildFlashMode(daily10,cfg){
  const item=daily10[state.flashIdx];
  const c=cfg.color;
  const key=`${state.sec}-${state.day}-${state.flashIdx}`;
  const flipped=state.isFlipped;
  return `
  <div class="flash-day-row">
    <span style="font-size:12px;color:#64748B;font-weight:600">Day:</span>
    <select class="day-select" id="flash-day-sel" style="background:#0E0E1E;color:#F0F4FF;border-color:${c}44">
      ${Array.from({length:11},(_,i)=>`<option value="${i}" ${i===state.day?"selected":""}>Day ${i+1}</option>`).join("")}
    </select>
  </div>
  <div class="flash-counter" style="color:${c}">${state.flashIdx+1} / ${daily10.length}</div>
  <div class="flip-wrap" id="flip-card">
    <div class="flip-inner ${flipped?"flipped":""}">
      <div class="flip-f" style="background:linear-gradient(135deg,${c}DD,${c})">
        <div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:.65;margin-bottom:10px">Question</div>
        <div style="font-family:var(--ff-h);font-size:16px;font-weight:700;line-height:1.4">${item.q}</div>
        <div style="font-size:10px;opacity:.5;margin-top:14px">tap to reveal ✨</div>
      </div>
      <div class="flip-b" style="border-color:${c}44">
        <div class="cat-badge" style="color:${c};border-color:${c}33;background:${c}18;margin-bottom:12px">${item.c}</div>
        <div style="font-family:var(--ff-h);font-size:20px;font-weight:800;color:#F0F4FF;margin-bottom:10px">${item.a}</div>
        <div class="hm-badge"><span>🇮🇳</span><span class="hm-text">${item.h}</span></div>
      </div>
    </div>
  </div>
  <div class="flash-nav">
    <button class="flash-btn" data-action="flash-prev" style="border:1.5px solid ${state.flashIdx===0?"#1C1C38":"#2D3748"};background:${state.flashIdx===0?"#0E0E1E":"#12122A"};color:${state.flashIdx===0?"#374151":"#CBD5E1"}" ${state.flashIdx===0?"disabled":""}>← Prev</button>
    <button class="flash-btn" data-action="flash-flip" style="border:2px solid ${c};background:transparent;color:${c}">Flip 🔄</button>
    <button class="flash-btn" data-action="flash-next" style="border:none;background:${state.flashIdx===daily10.length-1?"#1C1C38":c};color:${state.flashIdx===daily10.length-1?"#374151":"#000"}" ${state.flashIdx===daily10.length-1?"disabled":""}>Next →</button>
  </div>
  <div class="flash-dots">
    ${daily10.map((_,i)=>`<div class="flash-dot" data-fidx="${i}" style="background:${i===state.flashIdx?c:"#1C1C38"}"></div>`).join("")}
  </div>`;
}

function buildQuizMode(cfg){
  const c=cfg.color;
  let html=`
  <div class="flash-day-row">
    <span style="font-size:12px;color:#64748B;font-weight:600">Day:</span>
    <select class="day-select" id="quiz-day-sel" style="background:#0E0E1E;color:#F0F4FF;border-color:${c}44">
      ${Array.from({length:11},(_,i)=>`<option value="${i}" ${i===state.day?"selected":""}>Day ${i+1}</option>`).join("")}
    </select>
  </div>`;

  if(state.quizDone){
    const pct=Math.round((state.quizScore/state.quizQs.length)*100);
    const star=pct>=80?"🏆":pct>=60?"😊":"💪";
    html+=`
    <div class="result-box slide-up">
      <div class="result-emoji">${star}</div>
      <div class="result-score" style="color:${c}">${state.quizScore}/${state.quizQs.length}</div>
      <div class="result-pct">${pct}% Score</div>
      <div style="font-size:13px;color:#64748B;margin-bottom:24px">${pct>=80?"🔥 Zabardast! CUET ready ho gaye!":pct>=60?"💪 Accha! Thoda aur karo":📚 Practice karo — ho jaayega!"}</div>
      <div class="result-bar"><div class="result-fill" style="width:${pct}%;background:linear-gradient(90deg,${c},${c}99)"></div></div>
      <button class="retry-btn" data-action="quiz-retry" style="background:${c};color:#000">🔄 Dobara Try Karo</button>
    </div>`;
  } else if(state.quizQs.length===0){
    html+=`<div style="text-align:center;padding:30px;color:#64748B">Loading...</div>`;
  } else {
    const q=state.quizQs[state.quizIdx];
    const opts=state.quizOpts[state.quizIdx]||[];
    const prgW=((state.quizIdx)/state.quizQs.length)*100;
    const letters=["A","B","C","D"];
    html+=`
    <div class="quiz-progress">
      <div class="prog-bar"><div class="prog-fill" style="width:${prgW}%;background:${c}"></div></div>
      <span style="font-size:13px;font-weight:700;color:${c};min-width:45px;text-align:right">${state.quizIdx+1}/${state.quizQs.length}</span>
      <span style="font-size:13px;font-weight:700;color:#34D399;min-width:30px">✅${state.quizScore}</span>
    </div>
    <div class="q-card ${state.quizAnim}" style="background:${c}10;border-color:${c}30">
      <div class="q-label" style="color:${c}">${q.c}</div>
      <div class="q-text">${q.q}</div>
    </div>
    <div class="opts">
      ${opts.map((opt,i)=>{
        let cls="opt-btn";
        let letterbg=c+"22",lettercolor=c,lettercontent=letters[i];
        if(state.quizSelected!==null){
          if(opt===q.a){cls+=" correct";letterbg="#22C55E";lettercolor="#fff";lettercontent="✓";}
          else if(opt===state.quizSelected){cls+=" wrong";letterbg="#EF4444";lettercolor="#fff";lettercontent="✗";}
        }
        return `<button class="${cls}" data-opt="${encodeURIComponent(opt)}" ${state.quizSelected!==null?"disabled":""}>
          <span class="opt-letter" style="background:${letterbg};color:${lettercolor}">${lettercontent}</span>
          ${opt}
        </button>`;
      }).join("")}
    </div>`;
  }
  return html;
}

function buildAllMode(cfg){
  const c=cfg.color;
  const q=state.search.trim().toLowerCase();
  const filtered=q?cfg.data.filter(d=>Object.values(d).some(v=>String(v).toLowerCase().includes(q))):cfg.data;
  return `
  <div class="search-wrap">
    <span>🔍</span>
    <input class="search-input" id="search-inp" placeholder="Search karo - question, answer, hinglish..." value="${state.search}" style="--ac:${c}">
    ${state.search?`<button class="search-clear" id="search-clear">✕</button>`:""}
  </div>
  <div class="search-count">${filtered.length} / 110 dikh rahe hain</div>
  ${filtered.map(item=>buildStudyCard(item,cfg)).join("")}
  ${filtered.length===0?`<div class="empty-box"><div class="empty-emoji">🔍</div><div style="font-size:15px;font-weight:600">"${state.search}" ke liye kuch nahi mila</div></div>`:""}`;
}

function buildBookmarksMode(bmItems,cfg){
  const c=cfg.color;
  return `
  <div style="font-family:var(--ff-h);font-size:17px;font-weight:800;color:#F0F4FF;margin-bottom:16px">
    ⭐ Saved ${cfg.short} (${bmItems.length})
  </div>
  ${bmItems.length===0?`
  <div class="empty-box">
    <div class="empty-emoji">⭐</div>
    <div style="font-size:16px;font-weight:600;color:#4B5563;margin-bottom:8px">Kuch save nahi kiya abhi tak!</div>
    <div style="font-size:13px">Study cards mein ☆ dabao - save ho jaayega</div>
  </div>`:bmItems.map(item=>buildStudyCard(item,cfg)).join("")}`;
}

/* ═══════════════ EVENTS ═══════════════ */
function attachEvents(){
  // Section tabs
  document.querySelectorAll("[data-sec]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      state.sec=btn.dataset.sec;state.mode="study";state.day=0;
      state.flashIdx=0;state.isFlipped=false;state.search="";
      state.quizQs=[];render();
    });
  });
  // Mode tabs
  document.querySelectorAll("[data-mode]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      state.mode=btn.dataset.mode;state.flashIdx=0;state.isFlipped=false;state.search="";
      if(state.mode==="quiz"){initQuiz();}
      render();
    });
  });
  // Day dots
  document.querySelectorAll("[data-day]").forEach(btn=>{
    btn.addEventListener("click",()=>{state.day=parseInt(btn.dataset.day);render();});
  });
  // Day nav
  const pa=document.querySelector("[data-action='prev-day']");
  const na=document.querySelector("[data-action='next-day']");
  if(pa)pa.addEventListener("click",()=>{if(state.day>0){state.day--;render();}});
  if(na)na.addEventListener("click",()=>{if(state.day<10){state.day++;render();}});
  // Flash day select
  const fds=document.getElementById("flash-day-sel");
  if(fds)fds.addEventListener("change",e=>{state.day=parseInt(e.target.value);state.flashIdx=0;state.isFlipped=false;render();});
  // Quiz day select
  const qds=document.getElementById("quiz-day-sel");
  if(qds)qds.addEventListener("change",e=>{state.day=parseInt(e.target.value);initQuiz();render();});
  // Flashcard flip
  const fc=document.getElementById("flip-card");
  if(fc)fc.addEventListener("click",()=>{state.isFlipped=!state.isFlipped;render();});
  const fb=document.querySelector("[data-action='flash-flip']");
  if(fb)fb.addEventListener("click",e=>{e.stopPropagation();state.isFlipped=!state.isFlipped;render();});
  const fp=document.querySelector("[data-action='flash-prev']");
  if(fp)fp.addEventListener("click",e=>{e.stopPropagation();if(state.flashIdx>0){state.flashIdx--;state.isFlipped=false;render();}});
  const fn=document.querySelector("[data-action='flash-next']");
  if(fn)fn.addEventListener("click",e=>{e.stopPropagation();const d=SECTIONS[state.sec].data;const dq=getDaily10(d,state.day);if(state.flashIdx<dq.length-1){state.flashIdx++;state.isFlipped=false;render();}});
  document.querySelectorAll("[data-fidx]").forEach(dot=>{
    dot.addEventListener("click",()=>{state.flashIdx=parseInt(dot.dataset.fidx);state.isFlipped=false;render();});
  });
  // Quiz options
  document.querySelectorAll("[data-opt]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      if(state.quizSelected!==null)return;
      const opt=decodeURIComponent(btn.dataset.opt);
      state.quizSelected=opt;
      const q=state.quizQs[state.quizIdx];
      if(opt===q.a){state.quizScore++;state.quizAnim="pop";}
      else{state.quizAnim="shake";}
      render();
      setTimeout(()=>{
        state.quizAnim="";
        if(state.quizIdx+1>=state.quizQs.length){state.quizDone=true;}
        else{state.quizIdx++;state.quizSelected=null;}
        render();
      },1300);
    });
  });
  // Quiz retry
  const qr=document.querySelector("[data-action='quiz-retry']");
  if(qr)qr.addEventListener("click",()=>{initQuiz();render();});
  // Bookmarks
  document.querySelectorAll("[data-bm]").forEach(btn=>{
    btn.addEventListener("click",e=>{
      e.stopPropagation();
      const k=btn.dataset.bm;
      if(state.bookmarks.has(k))state.bookmarks.delete(k);
      else state.bookmarks.add(k);
      render();
    });
  });
  // Search
  const si=document.getElementById("search-inp");
  if(si)si.addEventListener("input",e=>{state.search=e.target.value;render();});
  const sc=document.getElementById("search-clear");
  if(sc)sc.addEventListener("click",()=>{state.search="";render();});
}

/* ═══════════════ BOOT ═══════════════ */
render();
</script>
</body>
</html>
